body:
  text: 易學象數論卷五餘姚黃宗羲撰皇極一皇極之數一元十二會為三百六十運一會三十運為三百六十世一運十二世為三百六十年一世三十年為三百六十月一年十二月為三百六十日一月三十日為三百六十時一日十二時為三百六十分一時三十分為三百六十秒蓋自大以至於小總不出十二與三十之反覆相承而已以掛一圖之二百五十六卦分配凡一運一世一年一月一日一時各得四爻其為三百六十者盡二百四十卦餘十六卦分於二十四氣亦每氣得四爻以寓閏法於其間不論運世年月日時皆有閏也然推求其說多有可疑夫自一年成數言之為三百六十日自十二月言之為三百五十四日自二十四氣言之為三百六十五日三時自閏嵗言之為三百八十四日今以康節之術按之於厯辰法三百六十其數皆以秒言日法四千三百二十月法十二萬九千六百嵗法一百五十五萬五千二百世法四千六百六十五萬六千運法五億五千九百八十七萬二千㑹法一百六十七億九千九百一十六元法二千一十五億五千三百九十二萬皆成數也在一月為三十日於朔策强二千一百六十於氣策弱一千八百九十在一年為三百六十日於嵗實弱二萬二千六百八十於十二朔實强二萬五千九百二十既不可施之厯矣乃於二氣相接之際各增一日以為閏以准一年三百八十四日之數可謂巧矣然三百八十四日有閏之嵗也閏雖每嵗有之亦必積之三嵗兩嵗而後滿於朔實故有三百八十四日之嵗若一嵗之閏䇿只四萬八千六百今槩之三百八十四日是嵗嵗有閏月也豈可通乎且所謂閏者見之於年月日時者也就如其說增此四爻亦當增之於三百六十之中徒增之於卦其為三百六十者如故是有閏之名而無閏之實矣是故運世歲無閏而月日時有閏六者不可一例一年之日三百五十四以運准之則少六日一月之時三百五十四以世准之則少六時康節必欲以十二與三十整齊之其奇齡豈可抹殺乎如以康節之數而立法歲實一百五十七萬七千八百八十朔䇿一十二萬七千四百四十氣䇿六萬五千七百四十五閏法四萬八千六百由此推而上之為元㑹運世庶乎可通耳康節之為此書其意總括古今之厯學盡歸於易奈易之於厯本不相通硬相牽合所以其說愈煩其法愈巧終成一部鶻宇厯書而不可用也皇極二起運乾兌離震為天之四卦四卦自交成十六卦十六而十六之得二百五十六卦謂之掛一圗以之分配元㑹運世年月日時然在一元㑹止十二止以辟卦配之一元之中有三百六十運一㑹之中有三百六十世一運之中有三百六十年一世之中有三百六十月一年之中有三百六十日一月之中有三百六十時凡此六者則以掛一圖配之皆用四爻直一三百六十盡二百四十卦餘十六卦每氣之首各用四爻二十四氣恰盡餘卦顧六者起卦各有不同一曰運卦張文饒得牛無邪之傳以為堯當賁之六五堯即位在日甲月己星癸辰未之甲辰年已歷一百八十運若起元之元之元之元泰卦至此在㑹之世之世之世其卦為同人與無邪之傳異矣惟起於世之元之元之元升卦則至此是元之世之世之世始合無邪之賁直三四五上爻一爻直三世其世在己未則是五爻以來四十一年也故文饒據此遂起升卦番易祝氏謂起泰者未然之卦運世用之起升者已然之卦嵗月日時用之直以堯當同人然無邪有所授受祝氏以意逆之固不當舍無邪而從祝氏也二曰世卦起於㑹首所當之卦子㑹起升丑㑹起否寅㑹起損卯㑹起泰辰㑹起渙已㑹起屯午㑹起損未㑹起坎申㑹起比酉㑹起大畜戌㑹起隨亥㑹起剝夏禹八年入午㑹祝氏起卦用泰午㑹之首在大畜故以大畜六五至節九二為世之始其卦雖異損其起於午㑹同也但以堯之己未世直賁歷明夷同人以與午㑹之大畜相接續不知逆推而上則巳㑹甲子世一千八百一亦起於大畜矣以巳㑹而用午㑹之起卦何所取義蓋祝氏聞堯運在賁之說用元之元以推運卦既不能合而午㑹世起大畜其上適與賁接遂謂無邪所言為堯之世卦非運卦也亦未嘗逆推知其乖戻耳文饒言世卦隨大運消長遇竒卦則取後卦遇偶卦則取前卦併二卦以當十二世據之是世卦不煩别起只在運卦左右如己未世之運卦是賁為偶卦則取前卦之無妄合之分配癸亥運內之十二世可也三曰年卦所謂小運也以世當月以年當日視其世所當之辰而起子起冬至丑起大寒寅起雨水卯起春分辰起榖雨巳起小滿午起夏至未起大暑申起處暑酉起秋分戌起霜降亥起小雪所謂中朔同起三十日分二氣一氣分三候一月六候甲巳孟季仲各直五日子午卯酉為仲辰戌丑未為季寅申巳亥為孟仲孟逆生先候五日季順行後候五日即如唐堯以己未世為月甲辰年為日甲辰是大暑以甲巳季日當後五日起卦直師之三四五上至十一年甲寅得蠱之初六為立秋節己未世之季氣即庚申世之初氣也若漢高小運以己未世為月甲午為日亦是大暑以甲巳仲日當先五日起卦直歸妹初九祝氏用元之元卦圖其起卦皆氣後月十五日非也四曰月卦以甲子甲午年之正月起升䝉三十年而一周文饒又言月卦隨小運進退如世卦之法如堯時師為甲辰年偶卦則取前卦艮合之一爻配一月也五曰日卦從氣不從月以立春起升蒙一年而周六曰時卦以朔日之子起升蒙一月而周康節當時有數鈐私相授受後之為學者多失其傳余為考定如此即如十二㑹之辟卦朱子曰經世書以十二辟卦管十二㑹綳定時節却就中推吉凶消長堯時正是乾卦九五按一㑹得一卦㑹有三十運是五運得一爻也巳會當星之巳一百七十六已入乾上九唐堯在星之癸一百八十是上爻將終安得云九五哉於其易明者且然况科條煩碎孰肯究心於此乎皇極三卦氣序卦氣圖二百五十六位之序雖曰乾兌離震四卦自交而成然按之方圖又錯雜時有出入則别立取卦之法於通數中除極數以謂即見聖人畫卦之㫖通數二萬八千九百八十一萬六千五百七十六陽剛太少其數十凡四位為四十以四因之得一百六十陰柔太少其數十二凡四位為四十八以四因之得一百九十二以二數相唱和各得三萬七百二十謂之動植體數於一百六十陽數之中除去陰數四十八得一百十二於一百九十二陰數之中除去陽數四十得一百五十二以一百五十二與一百十二相唱和各得一萬七千二十四謂之動植用數以用數自乘得通數極數元之元一元之㑹十二元之運三百六十元之世四千三百二十㑹之元十二㑹之㑹一百四十四㑹之運四千三百二十㑹之世五萬一千八百四十運之元三百六十運之㑹四千三百二十運之運一十二萬九千六百運之世一百五十五萬五千二百世之元四千三百二十世之㑹五萬一千八百四十世之運一百五十五萬五千二百世之世一千八百六十六萬二千四百假令元之元置通數從左起二萬至右六凡九位以其中位之一萬分列於右四位為九千九百九十十其通數萬下之六千五百七十六除去不用以此列之除卦身八算在千位除之又除元之元極數一餘二萬八千九百八十萬一千九百九十九以中位萬為中位左見八八屬坤右見一一屬乾左為外卦右為內卦成地天泰其第二卦即以第一卦餘算除卦身除極數滿六十四卦方去餘算再置通數如在㑹之元即以十二除起凡除卦身動中萬除右卦身進動百萬除左卦身然取卦往往不能相合則别有五法一法退陰於右卦減一算或二算二法進陽於左卦增一算或二算進退不過三三法虛張竒畫虛張五則為乾六畫四法分布偶畫分布十則為坤十二畫五法消息移右算補左謂消隂息陽移左算補右謂之消陽息陰數不過八牛無邪所傳如此又謂退陰而不合則又進陽進陽而又不合則又虛張以至於消息而止皆必先右而後左以某推之則不然有不合者方用五法若右合而左不合當竟用其法於左安得先陰而後陽乎左為陽右為陰有不合者進退可合則用進退虛張分布可合則用虛張分布消息可合則用消息不須從進退以至於消息也此無邪之說胡廷芳所以謂之繁晦歟然用此五法以增減則無卦不可附㑹故必知卦而後可算卦若欲從算以定卦則五法俱不可用而通極二數有時而窮也圖之為序當必有說張祝二家皆影響矣皇極四蓍法七十二蓍合一曰太極分為二以象兩置左不用揲右以四視其餘數一為元二為㑹三為運四為世既得象矣元㑹運世為四象復合而分之取左之四并於右既分之後從左手取四策入於右手置左不用揲右以八視其餘數為上卦之體復合而分之取右之四并於左取右手四策入於左手置右不用揲左以八視其餘數為下卦之體二體相附既得卦矣復合而分之置右不用揲左以六視其餘數自一為初訖六為上以定直事之爻假令初揲餘一於象為元再揲餘五上體為巽三揲餘七下體為艮巽艮合為漸在卦氣圖得元之漸卦終揲餘六則上九為直事之爻漸當元之㑹之㑹之運以律呂圖求之元之㑹為日月聲卦當履㑹之運為火土音卦當蒙合之為物數則卦當遁困以觀物之象准之為皇之帝之帝之王皇帝王霸飛之走之走之木飛走木草士之農之農之工士農工商一之二之七之六之類是也上九爻變隂則為蹇爻自下而上竒位為陽偶位為隂當位則不變不當位則變以九處上為不當位故變上體㢲變震則為小過乾兑離震居上坤艮坎巽居下為當位反是為不當位當位則不變不當位則變以巽居上體故變卦爻皆以當位為吉不當位為凶漸者艮歸魂之卦以九三為世爻上九為應爻今上九為當世直事之爻則應復為世與本爻相敵此占之大略也康節本無蓍法張文饒立之以配易元包虗有辭而經世無辭有辭者以辭占無辭者占其陰陽之進退卦爻之當否時日之蚤暮五行之盛衰爻者時用也卦者定體也爻之變不變以觀其隨時卦之變不變以觀其大定變不變者數也利不利者命也辨其邪正則有理制其從違則有義若愛惡之私不忘於胸中則吉凶以情遷矣雖專心致志不可謂之誠也皇極五致用致用之法以一定之卦推治亂以聲音數取卦占事物凡占一卦視其卦之當位與否當位則不變不當位則變卦既變矣視其所直之爻當位與否當位則不變不當位則變以終變之卦為凖終變之卦即不當位亦不變本卦為貞變卦為悔當位則吉不當位則凶視其卦為竒為偶於方圖中竒卦在右為陽中陽在左為陰中陽偶卦在左為陰中陰在右為陽中陰陽為順陰為逆視其卦在某㑹某運某世大運以㑹當月以運當日以世當辰如堯之已㑹癸亥運己未世即一嵗之五月三十日未時也小運以世當月以年當日以月當時如堯之己未世甲辰年即一嵗之六月十一日也視其卦之納甲與所當之年月日時有無生尅視其卦之世應與所直之爻有無倫奪又以律呂圖求之運在四大象中某所得天門唱卦居左世在四大象中某所得地戶和卦居右合兩卦並觀在既濟圖第幾位合掛一圖問卦然後以其卦變化進退之而推其時運之吉凶若用年配世則以世求天門唱卦居左以年求地戶和卦居右與上一例取卦之時視算位中餘數以六位配六爻元自一起世至九終無問十百千萬皆以當一一為甲二為辛三為丙四為癸五為戊六為乙七為庚八為丁九為壬十為巳甲乙為木為饑饉為曲直之物庚辛為金為兵戈為刃物丙丁為火為大旱為鋭物壬癸為水為淫潦為流濕之物戊巳為土為中興為重滯之物此致用之大凡也皇極包羅甚富百家之學無不可資以為用而其要領在推數之無窮宋景濓作溟涬生贊記蜀道士杜可大之言曰宇宙太虛一塵爾人生其間為塵幾何是茫茫者尚了然心目間此一言已盡皇極之祕能者自有冥契則余言亦說鈴也掛一圖元㑹運世本數四互相乘則變為十六世之世之世之世八十一萬以九百乘九百而得世之世之世之運九百七十二萬以九百乘一萬八百世之運之世之運一億一千六百六十四萬以一萬八百乘一萬八百世之世之世之㑹二億九千一百六十萬以九百乘三十二萬四千世之運之運之運一十三億九千九百六十八萬以一萬八百乘十二萬九千六百世之世之世之元三十四億九千九百二十萬以九百乘三百八十八萬八千運之運之運之運一百六十七億九千六百一十六萬以十二萬九千六百自乘世之世之運之元四百一十九億九千四十萬以九百乘四千六百六十五萬六千世之世之㑹之㑹一千四十九億七千六百萬以九百乘一億一千六百六十四萬世之運之運之元五千三十八億八千四百八十萬以一萬八百乘四千六百六十五萬六千世之世之㑹之元一萬二千五百九十七億一千二百萬以九百乘十三億九千九百六十八萬運之運之運之元六萬四百六十六億一千七百六十萬以十二萬九千六百乘四千六百六十五萬六千世之世之元之元一十五萬一千一百六十五億四千四百萬以九百乘一百六十七億九千六百十六萬世之㑹之㑹之㑹三十八萬四百九十一億三千六百萬以三十二萬四千乘一億一千六百六十四萬世之運之元之元一百八十一萬三千九百八十五億二千八百萬以一萬八百乘一百六十七億九千六百十六萬世之㑹之㑹之元四百五十三萬四千九百六十三億二十萬以三十二萬四千乘十三億九千九百六十八萬運之運之元之元二千一百七十六萬七千八百二十三億三千六百萬以十二萬九千六百乘一百六十七億六百十六萬世之㑹之元之元五千四百四十一萬九千六百五十八億四千以三十二萬四千乘一百六十七億六百十六萬㑹之㑹之㑹之㑹一兆三千五百五十五萬四千八百九十六億以一億一千六百六十四萬自乘運之㑹之元之元六兆五千三百三萬四千七百億八十萬以三百八十八萬八千乘一百六十七億六百十六萬㑹之㑹之㑹之元十六兆三千二百五十八萬六千七百五十二億以一億一千六百六十四萬乘十三億九千九百六十八萬運之元之元之元七十八兆三千六百四十一萬六千四百九億六十萬以四千六百六十五萬六千乘萬一百六十七億九千六百十六㑹之㑹之元之元一百九十五兆九千一百四萬一千二十四億以一億一千六百六十四萬乘一百六十七億九千六百十六萬㑹之元之元之元二千三百五十兆九千二百四十九萬二千二百八十八億以十三億九千九百六十八萬乘一百六十七億九千六百十六萬元之元之元之元二萬八千二百十一兆九百九十萬七千四百五十六億以一百六十七億九千六百十六萬自乘又以十六數互相乘如元之㑹為一數其下之運之世為一數乘之變為二百五十六數分配二百五十六卦自泰起元之元之元之元得二萬八千二百十一兆九百九十萬七千四百五十六億至明夷卦終為世之世之世之世得八十一萬今舉二十五條為例以方圖裂為四片每片十六卦西北十六卦為天門乾主之東南十六卦為地戶坤主之東北十六卦為鬼方泰主之西南十六卦為人路否主之陽圖以天門十六卦為律每一位各唱地戶呂卦十六位謂之動數律左呂右從右橫觀上體與上體互下體與下體互又成兩卦每一位變西南之卦三十二共成一千二十四卦陰圖以地戶十六卦為呂每一位各唱天門律卦十六位謂之植數呂右律左從左橫觀又成兩卦每一位變東北之卦三十二共成一千二十四卦易學象數論卷五
