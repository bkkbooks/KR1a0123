body:
  text: 易學象數論易類提要臣等謹案易學象數論六卷國朝黃宗羲撰宗羲字太沖號梨洲餘姚人明御史尊素之子也博學通經多所著述其南雷文案中當日自序作是書之㫖云易廣大無所不備自九流百家借之以行其說而易之本意反晦世儒過視象數以為絶學故為所欺今一一疏通之知其于易本了無干涉而後反求程傳亦廓清之一端又稱王輔嗣注簡當而無浮義而病朱子添入康節先天之學為添一障蓋易至京房焦延夀而流為方術至宋陳摶而岐入道家學者失其初㫖彌推衍而轇轕彌增宗羲病其末派之支離先糾其本原之依托前三卷論河圖洛書先天方位納甲納音月建卦氣卦變互卦筮法占法而附以所著之原象為內篇皆象也後三卷論太元乾鑿度元苞潛虛洞極洪範數皇極數以及六壬太乙遁甲為外篇皆數也大㫖謂聖人以象示人有八卦之象六爻之象象形之象爻位之象反對之象方位之象互體之象七者備而象窮矣後儒之為僞象者納甲也動爻也卦變也先天也四者雜而七者晦矣故是編崇七象而斥四象而七者之中又必求其合于古以辨象學之訛又遁甲太乙六壬三書世謂之三式皆主九宫以參詳人事是編以鄭康成之太乙行九宫法證太乙以吳越春秋之占法國語伶州鳩之對證六壬而云後世皆失其傳以訂數學之失其持論皆有依據蓋宗羲究心象數故一一洞曉其始末而得其瑕疵非但據理空談不能中其要害者比也惟本宋薛季宣之說以河圖為即後世圖經洛書為即後世地志顧命之河圖即今之黃冊則未􅊵主持太過至矯枉過正轉使傳陳摶之學者得據經典而反脣是其一失然其宏綱巨目辨論精詳與胡渭圖書辨惑均可謂有功易道者矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
