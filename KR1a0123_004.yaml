body:
  text: 易學象數論卷四太玄餘姚黃宗羲撰揚子雲太玄以兩贊當一日七百二十九贊以當一嵗三百六十四日半於嵗法三百六十有五日四分日之一尚不及四分日之三也立踦贏二贊以補之例以兩贊一日則過四分日之一矣故蘇明允謂四分而加一是四嵗而加一日千載之後恐大冬之為大夏也欲以一百八分為日率四分之每分得二十七三之為八十一每首加一盡八十一首而四分日之三者無過不及之患矣然余以為元之所以準日者贊也加一分於首贊之不及如故是失所以立贊之意既以踦贏名贊不與他贊為伍則亦不援兩贊一日之例即以四分之三當之無不可矣苐踦以虛而言贏以盈而言猶之所謂氣盈朔虛也合氣贏朔虛十日有奇則踦贏當得二十餘贊今以二贊僅寄其名餘皆渾於七百二十九贊之中此則不可謂之合於厯也明允言聖人以六日七分言易而卦爻未嘗及之雄以三百六十五日四之一言玄而首贊擬之失其所以為書之意余以為易未嘗有六日七分之説加之起於後世子雲準厯以作玄苟不相似則又何以為書是故子雲之短不在局厯以失玄在不能牽玄以入厯也厯以一定之法禦其至變而後可以傳之久逺苟不得其至變即不可謂之定法也玄之中首起牛一度今未二千年冬至在箕四度星之屬水者已屬木矣其從違亦異此玄失之較然者也明允加一分以合四分之一不知四分之一者亦有消長則又不如踦贏之以不齊齊之也太玄蓍法令曰假太玄或作元通用假太玄孚貞爰質所疑于神于靈休則逢陽星時數辭從咎則逢隂星時數辭違以上命筮之辭凡筮有道不精不筮不疑不筮不軌不筮革不以其占不若不筮神靈之神靈之曜曾越卓去此四者而筮則神聽之矣此言為筮之道雙湖胡氏連上文為命筮非也三十有六而策視焉蓍之數三十有六天以三分終於六成故十有八策以下明蓍三十六之故三分者參天之數六成者一二三之積數十有八者三六之乘數天不施地不成因而倍之天施地成故地數亦十有八合之為三十六地則虛三以扮天十八也陽饒隂乏地則虛三故揲用三十三别一以挂于左手之小指三十三策之中取一以挂挂而後分也中分其餘以三搜之并餘于艻蘇氏作扐分為二刻三搜左刻置其餘或一或二或三次三搜右刻置其餘如前數其餘數不二即五挂策在外左二則右必三左三則右必二左一則右亦一以上初揲在易為再扐在玄為一艻之半次除前餘數復合其見存之策或三十或二十七不挂分搜如前法其餘數不三即六左一則右必二左二則右必一左三則右亦三以上為再揲再揲之餘并之於艻是為一艻艻即所挂之一也王制祭用數之仂鄭注什一挂先别於正數故名艻蓋再揲未竟餘數未并再揲竟則餘數并入挂內此所謂餘乃不用之數與上下分數之餘異一艻之後而數其餘七為一八為二九為三再揲止一挂故曰一艻餘數既并置之不用而數其所得之正策七其三為一畫一八其三為二畫一九其三為三畫一以成一方之位如是每再揲而成位自家而方曰位通計去八揲然後首名定也老泉蘇氏曰一挂一扐之多不過乎六既六而其餘二十七者可以為九而不可以為八七况夫不至於六哉於是改為再扐而三數其餘八扐而四位成羲按易再扐後挂之義揲左手竟而扐之揲右手竟而又扐謂之再扐蘇氏以初揲為一扐故加一扐於玄不知玄之以挂為艻也若凖易之例四位凡十六扐焉六算而策道窮也一艻止於再揲可以為七八九而不可以為六范注曰謂餘得七則下一算得八則下二算得九則下三算一二三凡六揲三十三止得六算故言窮也窮則揲以成四位不出七八九也七為一挂一不用餘數十一八為二挂一不用餘數八九為三挂一不用餘數五逢有下中上下思也中福也上禍也思禍福各有下中上九贊之位一思內二思中三思外四福小五福中六福大七福生八禍中九禍極以晝夜别其休咎焉首有隂陽一陽二隂終九起一陽首以一三五七九為晝二四六八為夜隂首以二四六八為晝一三五七九為夜筮者逢晝為休逢夜為咎一從二從三從是謂大休旦筮用一五七為一表夕筮用三四八為一表日中夜中筮用二六九為一表一五七逢陽首則皆晝為從逢隂首則皆夜為違三四八逢陽首則一晝兩夜逢隂首則一夜兩晝二六九逢陽首則兩夜一晝逢隂首則兩晝一夜三從者旦筮逢陽首也一從二從三違始中休終咎中筮逢隂首一從二違三違始休中終咎夕筮逢陽首一違二從三從始咎中終休夕筮逢隂首一違二違三從始中咎終休中筮逢陽首一違二違三違是謂大咎旦筮逢隂首占有四或星首五行一水二火三木四金五土六水七火八木九金終九首復一星五行角亢氐房心尾箕東方屬木奎婁胃昴畢觜參西方屬金井鬼柳星張翼軫南方屬火斗牛女虛危室壁北方屬水星與首同德是從與首背德是違或時冬至筮逢十月以前首為違冬至以後首為從夏至筮逢四月以前首為違夏至以後首為從或數即九贊晝夜之數或辭贊辭旦則用經夕則用緯南北為經東西為緯一六水在北二七火在南五土在中故一二五六七為經三八木在東四九金在西故三四八九為緯旦筮一五七是用經也夕筮三四八是用緯也中筮二六九經緯雜用之也觀始中決從終范注凡筮或先違而後從先從而後違或三皆從或三皆違決之者從終辭也推玄算筮所得首於八十一中次第何居推其算也家一置二置二三置三隨家所得之位置算部一勿增二增三三增六部位得一不置算得二置三算得三置六算州一勿增二增九三增十八方一勿增二增二十七三增五十四四位積算是首之次第也如筮得樂首一方三州二部三家方一不置算州三置十八算部二置三算家三置三算積二十四算是樂去中之數也求表之贊贊七百二十九分為二百四十三表筮所得次第之數置玄姓去太始策數玄姓筮所得之首太始中為羣首之始去太始策數即玄算也減而九之減所得之首一算以九乘之每首九贊故九之增贊增所得首之贊於乘數如樂首二十四減一以九乘得二百有七增入所得贊是去太始贊數也又如樂首二十四減一以三乘得六十有九增入所得表即是表數也去玄數半之則得贊去冬至日數矣玄以七百二十九贊加踦贏配三百六十五日四分日之一二贊而為一日故半之即得去冬至日數矣如樂首二百有七增二贊半之是一百五日偶為所得日之夜奇為所得明日之晝也二贊一晝一夜率一首而四日有半奇首之次九為偶首初一之晝此言奇偶統七百二十九贊也如樂首增一贊二百有八則偶乃是夷首次九之夜增二贊則奇為明日之晝求星從牽牛始除算盡則是其日也冬至日在牛一度中首之初一也日行一度已得日數依星度除之則得如樂首一百五日從牛一度除之盡是為胃五度星度牛八女十二虛十危十七室十六壁九奎十六婁十二胃十四昴十一畢十六觜二參九井三十一鬼四柳十五星七張十八翼十八軫十七角十二亢九氐十五房五心五尾十八箕十一斗二十六玄圖曰泰積之要始于十有八策終于二十有四天地人各十八并之五十四并始終策數半之為泰中并五十四于十八為七十二泰中之數三十有六策以律七百二十九贊凡二萬六千二百二十四策為太積猶易二篇之策也每贊三十有六乘之得太積策數七十二策為一日凡三百六十四日有半踦滿焉以合嵗之日而律厯行一嵗三百六十五日四分日之一七十二策二贊晝夜之數也太積策數於嵗日不及四分日之三應增五十四策此踦贏所繇作也王涯揲蓍法三十六策虛三挂一中分左右以三數左置餘以三數右置餘合左右正策數之為三者七而後一一數之及八以為二及九以為三不及八不及九從三三之數而以三七為一老泉蘇氏曰是苟以牽合乎一扐之言而不知夫八者須挂一扐三而後成而扐終不可以三也羲按左右一揲之餘其挂扐之數不三即六三者得三十策三七之餘為九六者得二十七策三七之餘為六更無得二十九策可以為八也然王氏雖謬不以餘策而論猶為未失其傳也胡雙湖揲蓍法三揲有餘一餘二餘三而無餘七餘八餘九之理解者甚多皆不通意者子雲之法以餘一準七餘二準八餘三準九只餘一二三則七八九自定矣故曰餘七為一八為二九為三只倒用一字故難解若作餘一為七二為八三為九人無不曉矣羲按胡氏舍正策而論餘數失之逺矣南宋以後揲蓍者皆尚簡便而置正策不獨太玄也然易之餘數與正策相合故論之不為失太玄餘數直置之不用者無可推之理假如胡氏所言一刻有餘一餘二餘三連挂則不得有餘一而有餘四二刻連挂則有餘三餘六而不得有餘一餘二然則三固準九六亦準九玄之四位皆三而已豈可通哉季彭山揲蓍法太玄揲法注家多不能通其説老泉以為傳之失者得其意矣蓋玄之虛三地之所以配天也而挂一於左手之策則天之所以運行乎地也其曰挂一非謂所用三十三策之中而挂其一也所用三十三策之中而挂其一則歸餘者與七八九之數不合矣故挂一者十策之中而挂其一也是三十三策之中分之為三而各挂一策所用實止三十策也范叔明曰十取出一名以為艻謂之艻者蓋以識三十蓍之數也如此則當其中分左右也止揲左策以其所餘者或一或二或三以合於所虛之三所挂之三則得一者為七得二者為八得三者為九而右策亦不必揲矣故不再扐也意其傳之者失此法耳所幸范注略發此意尚得以尋其緒焉羲按季氏牽合餘數故轉展愈誤也揚子之虛三老泉尚議之又從而挂其三乎據所引者范注而范云艻猶成也合之為十取一以識之為艻中分其餘於左手之二以三搜之其所餘者并之於左手兩指間以識揲蓍之數也凡一挂再艻以成一方之位然則范之所謂艻者餘數也為從餘數可以識正䇿之數季氏用之證挂不亦疏乎玄數曰别一以挂於左手之小指中分其餘以三搜之并餘於艻季氏曰挂三止搜左策不亦盡背之乎乾坤鑿度一自緯學禁絶之後其全書之見於今者乾鑿度而已而脫文誤字蕪不可理間常為之反覆推求其術有五一求所直部嵗置積算以元嵗除之餘不滿部首嵗即為天元滿部首嵗除之為地元再滿部首嵗除之為人元不盡以紀嵗約之即所入部之年也以部上之干支次其不滿紀嵗之年則得嵗次矣二求主嵗之卦置部首以來嵗數以三十二除之餘不足者從乾坤始二卦而當一嵗末算即主嵗之卦三求世軌世軌有二有唐堯世軌有文王世軌其用法則同置積算以大周三萬一千九百二十除之餘以七百六十而一為一軌不滿軌者即入軌之年也一軌消息一卦大周逢奇起復逢偶起姤四十二軌消息卦三周有半八十四軌消息卦七周所謂八十四戒也四求厄數軌意置大周以來年數用文王世軌大周三萬二百四十别用消息卦除之每一除為一厄此屬過去周而復始除至當下而止視其所直之年甲乙為飢丙丁為旱戊巳為中興庚辛為兵壬癸為水五求五德終始置積算以一千五百二十嵗除之餘以三百四嵗約之木金火水土相次為轉移之嵗五德日數置部首以來積日以一百八十除之餘以三十六約之甲庚丙壬戊五子相次是其日也其積算天元至文王受命之嵗二百七十五萬九千二百八十脫一五字嵗入戊午部二十九年伐崇侯作靈臺改正朔戊午部之嵗為庚子二十九年則戊辰也以武王伐紂十三祀推之時嵗在己卯則文王受命為丁卯伐崇改朔乃是受命後一年之事鄭康成謂受命後五年為此非也康成云三部首而一元一元而太嵗復於甲寅以甲寅為天元之嵗伐崇是戊午年而非戊午部也戊午年文王尚在羑里豈能伐崇哉召誥周公攝政七年孔穎達疏此年入戊午部五十六嵗嵗在乙未上距伐紂十七年伐崇二十八年其為戊午部而非戊午年明矣不得甲寅為天元嵗首也今定天元至壬子作象作象數論之嵗二百七十六萬二千一百四十九嵗入人元庚子部五年乾坤鑿度二主嵗之卦以周易為序而爻之起貞則以六日七分之法為序內卦為貞外卦為悔故從初爻起為貞其卦於六日七分在某月即以某月起初爻陽卦左行隂卦右行兩卦以當一嵗前為陽後為隂左行者其次順數右行者其次逆數皆間一辰乾於卦序在四月巳坤於卦序在十月亥今乾初不起四月坤初不起十月者以十一月陽生五月隂生乾坤不與衆卦偶故乾貞於十一月子坤又不起於五月者五月與十一月皆陽辰間辰而次則相重矣故貞於六月未舍午而用未是退一辰也屯序在十二月蒙序在正月各以其月為貞師序在四月比序亦在四月隂卦與陽卦同位隂卦退一辰而貞五月陽卦在陽辰子寅辰午申戌皆陽辰隂卦亦在陽辰陽卦在隂辰隂卦亦在隂辰丑卯巳未酉亥皆隂辰皆退一辰以為貞不特同位然也泰在正月貞其陽辰否在七月亦陽辰也自宜避之以兩卦獨得乾坤之體故各貞其辰而皆左行中孚貞於十一月子小過正月之卦也宜貞於二月卯而貞於六月非其次矣故云法乾坤蓋諸卦皆一例惟乾坤泰否中孚小過六卦不同此是作者故為更張自亂其義而注言泰卦當貞於戌否卦當貞於亥抑又不知所據矣乾坤鑿度三軌運測驗之法可以考見者以所值之軌分受命之君之善惡從世爻得正失正而言復之初陽得正故聖人臨之二陽失正故庸人泰之三陽得正故君子大壯之四陽失正故庸人夬之五陽得正故聖人乾之上陽失正故庸人姤之初隂失正故小人遁之二隂得正故君子否之三隂失正故小人觀之四隂得正故君子剝之五隂失正故小人坤之上隂得正故君子以一卦得正之爻為享國之世數復二四上三隂得正三六十八故十八世初陽得正而不數者陽少故也臨四上得正二六也故十二世泰初三得正為二九四上得正為二六并之三十世大壯初三得正為二九上得正為一五并之二十四世夬初三五得正為三九上得正為一四盛極而消并之三十二世姤遁主隂雖三五得正而皆陽也故止一世否二五得正一九一六得十五世以非盛時故即以二五為世數觀二四五得正而二五止數其位四則數位兼數并之二十世剝二四得正為二六故十二世乾三九二十七而三十二世者於五兼數其位也坤三六十八而三十六世者偶其數也其受命即位之年在入軌之初與天運相符則有賢子孫繼之以畢其軌亦如六爻次序自初至上不當軌年之初入軌已十年百年既與天運不符身幸不失子孫自不能繼受命之君其德宜與卦運相符茍失其德隂則起大而強陽則柔易而弱則不永其位水旱兵飢考知其年預為之備則可以救災度厄此五者其大略也然其言自相違背不審於理一軌七百六十年所謂聖人庸人君子小人者一君當之乎統一軌之君以當之乎乾為庸人而三十二世遁為君子而一世則是有天下者可一委之運數而人事不修也即位之年必欲當軌之初從古來有七百餘年不易姓者乎帝王之治天下允執其中寧因消息所直而過剛過柔以迎卦氣乎水旱兵飢十年內外不能不遇而以六百年七百年為期是亂日少而治日多也小道可觀致逺恐泥其斯之謂與乾鑿度厯法嵗之月十二餘十九分月之七紀嵗七十六紀月九百四十紀日二萬七千七百五十九部嵗一千五百二十部月一萬八千八百部日五十五萬五千一百八十元嵗四千五百六十元月五萬六千四百元日一百六十六萬五千五百四十分部之法十九年為一章章首甲子日子時朔旦冬至謂之至朔同日第二章首復得至朔同日然非甲子日乃癸卯日酉時第三章首至朔同日乃是癸未日午時第四章首至朔同日乃是癸亥日卯時歷四章畢得七十六年其明年至朔同日乃癸卯日子時因其至朔同時與第一章首同遂以七十六年斷為一紀而以其日干支名其部每章差三十九日九時每紀差一百五十九日除兩甲子則每紀止差三十九日二十紀通差七百八十日甲子十三周無餘復以甲子别起部首乾坤鑿度主嵗卦乾剝萃坤復升屯無妄困蒙大畜井需頥革訟大過鼎師坎震比離艮小畜咸漸履恆歸妹泰遁豐乾鑿度五德轉移木德三百四嵗金德六百八嵗火德九百一十二嵗水德一千二百一十六嵗土德一千五百二十嵗五德日數從部首起冬至甲子朔木德甲子三十六日金德庚子三十六日火德丙子三十六日水德壬子三十六日土德戊子三十六日元包元包祖京氏以為書分純卦為八宫一世二世為地易三世四世為人易五世六世為天易遊魂歸魂為鬼易但更其次序先隂而後陽則歸藏之旨也首坤宫八卦為太隂次乾宫八卦為太陽兌宫八卦為少隂艮宫八卦為少陽離宫八卦為仲隂坎宫八卦為仲陽巽宫八卦為孟隂震宫八卦為孟陽蓍用三十六䇿太隂之數也兩手分之先取左手之策以三數之滿四三共十二策則置之左餘一餘二餘三皆為歸奇數餘四餘五餘六其三為爻數一與二與三為歸奇數餘七餘八餘九其兩三為爻數一與二與三為歸竒數餘十餘十一其三三為爻數一與二為歸奇數次取右手之策以三數之滿四三則置之右左餘一則右餘十一左餘二則右餘十其三三為爻數其二其一為歸奇數左餘三則右餘九左餘四則右餘八左餘五則右餘七其兩三為爻數其三其二其一為歸奇數左餘六則右餘六左餘七則右餘五左餘八則右餘四其一三為爻數其三其二其一為歸奇數左餘九則右餘三左餘十則右餘二左餘十一則右餘一皆為歸奇數於是合兩手之餘策爻數不九即六歸奇數不六即三爻數得九者陽畫也歸奇數則三矣爻數得六者隂畫也歸奇數則六矣兩手各存十二策者體數也爻數歸奇數相消長亦十二策者用數也凡六合十二揲而卦體定矣其書因卦兩體詁以僻字義實庸淺何所用蓍而好事者為之張皇也宋楊楫謂元嵩益州成都人明隂陽厯算獻策周武帝帝賜爵持節蜀郡公武帝不敢臣之有傳在北史今按北史周書皆無元嵩之傳惟唐書藝文志列元包十卷不知楫何所據也潛虛萬物皆祖於虛生於氣氣以成體體以受性性以辨名名以立行行以俟命此數言者潛虛之大綱也以五行生成圖為氣圖而變一為丨二為􅕶三為川四為􅙍五為五六為丅七為丌八為􅜟九為􅜞十為十詁之以原熒本廾基委焱末忍冡將謂虛能生氣墮老氏有生於無之説體分十等王公嶽牧率侯卿大夫士庶此十等者位也而非體也二五之精妙合而凝乾道成男坤道成女乃所謂體性専生克先列十純其次降一水與火配其次降二水與木配其次降三水與金配其次降四水與土配其下皆降次以配以生成自配終焉湯誥曰惟皇上帝降衷於下民若有恆性以生克言性則雜矣不可謂之恆也溫公從來不知性曰性者人之所受於天以生者也善與惡兼有之雖聖人不能無惡雖愚人不能無善其所受多少之間則殊耳其論性如此猶之雜生克而為言也其名五十有五萬物始於元著於裒存於齊消於散訖於餘五者形之運也柔剛雍昧昭性之分也容言慮聆覿動之官也繇懠得厲耽情之􅦔恤也歬卻庸妥蠢事之變也訒宜忱哲戛德之塗也特偶䁥續考家之綱也范徒醜𨽻林國之紀也禋準資賔􅞯政之務也斆理績育聲功之具也興痡泯造隆業之著也有性而後有情有情而後有視聽言動有德而後有事以動先於情以事先於德失其次矣元餘齊三名無變五十二名之變三百六十四謂之行以其有辭之可見也吉臧平否凶五者謂之命以其為時之所遇也觀辭之善者命必吉次善者命必臧辭之惡者命必凶次惡者命必否辭之善惡半者命必平所謂盡人以合天也而隂用其幽則是善者必凶惡者必吉次善次凶次惡次吉天道與人事相反其於勸懲之道又何居焉既云初上者事之終始不占則得名之後揲當五以求變其揲以七使得初上將焉用之是故玄以準易虛以準玄亦猶文章遞相模倣無關大道論者至謂由虛以曉玄由玄以究易斯無躐等之患使有人言曰由三都以曉兩京由劇秦以究封禪當無信者不知何以異於是朱子云潛虛後截是張行成續不押韻見得今後截未嘗不押韻似亦不可辨也潛虛蓍法五行相乘得二十五又以三才乘之得七十五以為策蓍之數七十有五虛五用七十分為二取左一挂於右揲左以十觀其餘扐之中分七十策取左一策挂於右十數左策觀其餘而畫丨􅕶川􅙍五丅丌􅜟􅜞十之數於左方復合為一再分之挂揲右如左法揲左畢置右不揲復合七十策分為二取右一策挂於左揲右觀其餘畫數於右方置左不揲曷為不左右皆揲而需復合哉虛之左右各備五行之性若一挂而畢嫌乎所以授性者不全也故必需七十而成左七十而成右雖曰左右實分先後也左主右客先主後客者陽先客後主者隂左主位右客位行圖之中左右原有定位先後所得與其左右相符是為先主後客者陽先後所得左者乃圖之右右者乃圖之左是為先客後主者隂虛合二數為名非如易之上下互換則為他卦其左右之分止辨隂陽名固不易也觀其所合以名命之左右合而虛名定既得其名又合蓍分之陽則置右而揲左隂則置左而揲右此求虛之變猶易之爻也復合七十策分為二陽則取左一挂於右揲左置右不揲隂則取右一挂於左揲右置左不揲生純置右成純置左左右同者為純在生數者元􅕶蠢􅙍容􅜸徒齊為陽在成數者造考歬五績草為隂故揲與之凖揲以七所揲之餘為所得之變虛之變七故不得復以十揲之觀吉凶臧否平而決之陽用其顯陰用其幽幽者吉凶臧否與顯戾也吉凶臧否平因所得之變觀於命圖陽則吉凶不易陰則圖之言吉者反凶言凶者反吉欲知始中終者以所筮之時占之先體為始後體為中所得之變為終變己主其大矣又有吉凶臧否平者於變之中復細别也先體左也後體右也筮虛凡三揲以為始中終之時不信不筮不疑不筮不正不筮不順不筮不蠲不筮不誠不筮必蠲必誠神靈是聽張敦實曰七十五䇿以占五十五名衍而積之凡三千八百五十䇿以成變化之用羲按玄以三十有六律七百二十九贊固未嘗除虛三之策也虛之積策惡得除虛五哉當得四千一百二十五也命圖元齊餘三者無變皆不占初上者事之終始亦不占吉臧平否凶吉臧平否凶裒六四二五三特五四三六二柔五四三六二偶四六五二三剛四六五二三䁥三二五六四雍三二五六四續二四五六三昧二四五六三考六四二五三昭六四二五三范五四三六二容五四三六二徒四六五二三言四六五二三醜三二五六四慮三二五六四𨽻二四五六三聆二四五六三林六四二五三覿六四二五三禋五四三六二繇五四三六二凖四六五二三懠四六五二三資三二五六四得三二五六四賔二四五六三罹二四五六三􅞯六四二五三耽六四二五三斆五四三六二歬五四三六二理四六五二三郤四六五二三續三二五六四庸三二五六四育二四五六三安二四五六三聲六四二五三蠢六四二五三興五四三六二訒五四三六二痡四六五二三宜四六五二三泯三二五六四忱三二五六四造二四五六三哲二四五六三隆六四二五三戞六四二五三散五四三六二洞極一關子明易所傳有兩種一為易傳一為洞極真經陳師道言關子明易傳阮逸所著而不及洞經豈當時合為一書耶即不然洞極逺出易傳之下其為偽書者更不及逸矣洞極以洛書之文九前一後三左七右四前左二前右八後左六後右故立生以象天育以象地資以象人一為生之一四為生之二七為生之弎二為育之一五為育之二八為育之弎三為資之一六為資之二九為資之弎三象變而各九以成二十七象以凖彖一二弎以準三爻翼以凖彖傳則以凖大象傳以凖小象首生次萌息華茂止安實繼之以資次用達興紊悖靜平序繼之以育次和塞作渙幾抑冥通十一論以發明大意則準易之繫辭焉其言生也曰形而上者謂之天日月星辰皆天也其言育也曰形而下者謂之地山川草木皆地也其言資也曰命於中者謂之人戎狄禽魚皆人也全割昌黎原人以為已有與易傳不出一手亦明矣獨怪朱子既知其偽而又引以證圖十書九何也洞極二極數篇曰天一地二人三天四地五人六天七地八人九三極之數四十五天有十二地有十五人有十八審其數而畫之三十有九則一四十有二則二四十有五則弎生之策百一十七育之䇿百二十六資之策百三十五遺其餘則三百有六十當期之日顯冥之道盡矣此蓍法也胡廷芳云三策之數本甚不合遺其餘七六五然後合三百六十之數未敢以為然揚止菴云意其揲當用四十九策而虛三如揚雄之法而挂一不用以九揲左手之策視其所得之策而定畫焉右則不揲自三十有九至三百有六十當期之日其説多牽強不可通某按後人不得其解而洞極之蓍法亡矣間嘗推之而復得用四十五策分為三刻不挂每刻以三揲之不滿三為餘若三刻各餘二者為三十九則一畫一若三刻各餘一者若一刻餘一一刻餘二一刻無餘者為四十二則二畫一若三刻各無餘者為四十五則弎畫是為初畫復合全策如前法者二是為二畫三畫而極成矣三極之數四十五者即䇿數也天有十二一四七地有十五二五八人有十八三六九者合天地人得四十五以明策數之故三十有九則一者三刻各餘二四十五除六為三十有九於畫得生也四十有二則二者或三刻各餘一或三刻餘一餘二無餘四十五除三為四十有二於畫得育也四十有五則弎者三刻各無餘四十五不除於畫得資也生之策百一十七者三合策而成極三其三十九為百一十七育之策百二十六者三其四十二資之策百三十五者三其四十五遺其餘則三百六十者去七六五以當期之數猶二篇之策萬有一千五百二十無礙於當萬物之數也蓋諸家蓍法大略分二此獨分三大略揲四則餘四揲三則餘三此獨揲三而不餘三推尋者槩以常法故展轉而不能得也洪範蔡九峯洪範數大略倣濳虛而作虛有丨􅕶川􅙍五丅丌􅜟􅜞十之數範俱因之但去十而易􅜸虛變卦之上下為左右範亦因之虛名丨為原範亦名􅕶為原虛分占為五吉臧平否凶範分占為九吉咎祥吝平悔災休凶蓍法虛簡而範煩曷不用七十策初揲左以九再揲右以九大數得矣求小數復如大數之法則四揲而畢此恐雷同於虛而故避之者也虛有爻而範無爻然虛不占其辭而占其所值之吉凶則範之小數即其爻也範得一陽二陽三陽一陰二陰三陰當年甲子應之者大吉以陽應陽以陰應陰而非正對亦為次吉求其事類皆於吉圖範得一陽二陽三陽一陰二陰三陰當年甲子違之者大凶以陰違陽以陽違陰而非正對亦為次凶求其事類皆於凶圖虛之為陰陽者二範之為陰陽者六範之五行一六為水二七為金三八為木四九為火中五為土虛之五行一六為水二七為火三八為木四九為金五十為土一本九宮世名洛書一本生成世名河圖雖異而實同也故以數而論虛之與範無所優劣以辭而論虛有易林太玄之遺範無聞焉乃後世進範而退虛豈知言者哉胡廷芳謂變數之法不傳莫能適諸用也某既疏明其變數誠依法用之其猶賢夫火珠林之類也夫洪範蓍法蓍五十虛一分二挂一取右刻一策挂於左手小指間以三揲之視左右手歸餘於扐取左刻之策以三數之餘或一或二或三歸扐於左手無名指間次揲右刻之策餘幾歸扐於左手中指間連挂左二則右必二左三則右必一左四則右必三是為一揲為綱視左右之餘策兩竒為一左三右一是也兩偶為二左二右二是也竒偶為三左四右三是也範分左右猶卦分上下此雖有一二三之數然未成一旁需之再揲綱必待於目也復合見存之策除去挂扐之策初揲得四三則見存四十二初揲得三一或二二則見存四十五分挂揲歸如前法是為再揲為目挂扐之數左四則右必二左三則右必三左二則右必一亦以兩竒為一左三右三是也兩偶為二左四右二是也竒偶為三左二右一是也初揲綱也再揲目也綱一函三以虛待目目一為一以實從綱綱一數具三數故一可以為一亦可以為二亦可以為三待目而分二之為四五六三之為七八九亦然如初揲一再揲一則實其函之一於左方立丨再揲二則實其函之二於左方立􅕶再揲三則實其函之三於左方立川如初揲二再揲一則實其函之四於左方立􅙍再揲二則實其函之五於左方立􅜸再揲三則實其函之六於左方立丅如初揲三再揲一則實其函之七於左方立丌再揲二則實其函之八於左方立􅜟再揲三則實其函之九於左方立􅜞此正九數也兩揲而九數具四揲而數名立兩揲具範之左方復合四十九策如前兩揲以具右方此之九數也如正九是一數之九是二數為一之二濳如正九是五數之九是六數為五之六伏八揲而六千五百六十一之數備數名既定復兩揲以具左方是變九之正九也復兩揲以具右方是變九之九也凡四揲而得大數下之小數如變正九是三變之九是八即為三之八如大數得一之一為原當於原下尋小數大數下之橫即小數之左縱即小數之右橫三縱八相合之處便是變九也一大數之下有八十一小數以八十一乘之得六千五百六十一數吉凶休咎覩矣大事用年其次用月其次用日其次用時此占法也大數為年反大數為月小數為日反小數為時反之者如大數左一右二為濳月則左二右一為成也如小數左右三在濳下之第三局時則左三右一在下之第十九局也如大數小數左右同者則月時與年日同占此猶易之卦變辨其陰陽五行物無遁情左方以辨陰陽一三為一陽五為二陽七九為三陽二為一陰四六為二陰八為三陰右方以分五行一六為水二七為金三八為木四九為火中五為土如筮得一之一謂之一陽屬水五之二謂之二陽屬金七之三謂之三陽屬木二之四謂之一陰屬火四之五謂之二陰屬土八之六謂之三陰屬水餘倣此洪範名數一數吉咎祥吝平悔災休凶二數吝吉咎災平祥休凶悔三數災吝吉休平咎凶悔祥四數咎祥悔吉平凶吝災休五數平平平平平平平平平六數休災吝凶平吉悔祥咎七數祥悔凶咎平休吉吝災八數悔凶休祥平災咎吉吝九數凶休災悔平吝祥咎吉小數圖縱一縱二縱三縱四縱五縱六縱七縱八縱九橫一丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶丨元丨吉丨吉丨吉丨吉丨吉丨吉丨吉丨吉橫二丨吉􅕶咎川祥􅙍吝􅙍平丅悔丌災􅜟休􅜞凶􅕶咎􅕶咎􅕶咎􅕶咎􅕶咎􅕶咎􅕶咎􅕶咎􅕶咎橫三丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶川祥川祥川祥川祥川祥川祥川祥川祥川祥橫四丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災丅休􅜞凶􅙍吝􅙍吝􅙍吝􅙍吝􅙍吝􅙍吝􅙍吝􅙍吝􅙍吝橫五丨吉􅕶咎􅜟祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶􅜸平􅜸平􅜸平􅜸平􅜸平􅜸平􅜸平􅜸平􅜸平橫六丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶丅悔丅悔丅悔丅悔丅悔丅悔丅悔丅悔丅悔橫七丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶丌災丌災丌災丌災丌災丌災丌災丌災丌災橫八丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶􅜟休􅜟休􅜟休􅜟休􅜟休􅜟休􅜟休􅜟休􅜟休橫九丨吉􅕶咎川祥􅙍吝􅜸平丅悔丌災􅜟休􅜞凶􅜞凶􅜞凶􅜞凶􅜞凶􅜞凶􅜞凶􅜞凶􅜞凶􅜞凶大數下之小數起一一以至九九八十一數皆同其吉凶則互換左以橫序右以縱序如左是一數則吉起橫一凶終橫九左是二數則吝起橫一悔終橫九如右是一數則吉起縱一凶終縱九右是二數則吝起縱一凶終縱九皆視周流圖以原右一左一下一圖為例易學象數論卷四
