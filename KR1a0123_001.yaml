body:
  text: 易學象數論卷一餘姚黄宗羲撰圖書一歐陽子言河圖洛書怪妄之尤甚者自朱子列之本義家傳户誦今有見歐陽子之言者且以歐陽子為怪妄矣然歐陽子言其怪妄亦未嘗言其怪妄之由後之人徒見圖書之説載在聖經雖明知其穿鑿傅㑹終不敢犯古今之不韙而黜其非中間一二大儒亦嘗致疑於此張南軒以河圖為興易之祥魏鶴山則信蔣山之説以先天圖為河圖五行生成數為洛書而戴九履一者則太乙九宫之數宋潜溪則信劉歆以八卦為河圖班固洪範本文為洛書皆礙經文而為之變説也是故歐陽子既黜圖書不得不并繋辭而疑其偽不偽繫辭則河出圖洛岀書之文駕乎其上其説終莫之能伸也然則欲明圖書之義亦惟求之經文而已六經之言圖書凡四書顧命曰河圖在東序論語曰河不出圖禮運曰河出馬圖易曰河出圖洛出書聖人則之由是而求之圖書之説従可知矣聖人之作易也一則曰仰以觀於天文俯以察於地理再則曰仰則觀象於天俯則觀法於地於是始作八卦此章之意正與相𩔖天垂象見吉凶聖人象之者仰觀於天也河出圖洛出書聖人則之者俯察於地也謂之圖者山川險易南北高深如後世之圖經是也謂之書者風土剛柔户口扼塞如夏之禹貢周之職方是也謂之河洛者河洛為天下之中凡四方所上圖書皆以河洛繫其名也顧命西序之大訓猶今之祖訓東序之河圖猶今之黄冊故與寳玉雜陳不然其所陳者為龍馬之蜕與抑伏羲畫卦之稿本與無是理也孔子之時世莫宗周列國各自有其人民土地而河洛之圖書不至無以知其盈虚消息之數故歎河不出圖其與鳯鳥言之者鳯不至為天時圖不出為人事言天時人事兩無所據也若圖書為畫卦叙疇之原則卦畫疇叙之後河復出圖將焉用之而孔子嘆之者豈再欲為畫卦之事耶觀於論語而圖書之為地理益明矣禮運出於漢儒此可無論揚子曰衆言淆亂則折諸聖經文既如是其明顯則後儒之紛紜徒為辭費而已矣某之為此言者𤼵端於永嘉薛士隆士隆曰河圖之數四十有五乾元用九之數也洛書之數五十有五大衍五十之數也究其終始之數九實尸之故地有九州天有九野傳稱河洛皆九曲豈取數於是乎士隆既不安後儒之説超然逺覽而又膠滯於數始信衆言之難破也圖書二按漢儒孔安國劉㰴皆以八卦為河圖洪範本文為洛書鄭𤣥依緯書則云河圖有九篇洛書有六篇自唐以前皆祖其説無有異同其一六居下之圖揚雄曰三八為木為東方四九為金為西方二七為火為南方一六為水為北方又曰一與六共宗二與七共明三與八成友四與九同道五與十相守乾坤鑿度曰天本一而立一為數原地配生六成天地之數合而成水性天三地八木天七地二火天五地十土天九地四金虞翻易注曰一六合水二七合火三八合木四九合金五十合土黄帝内經曰太過者其數成不及者其數生土常以生也王冰注生數水數一火數二木數三金數四土數五成數水數六火數七木數八金數九土數五厯攷諸家皆以為天地之數初未嘗以此為河圖也其戴九履一之圖乾鑿度曰太乙行九宫四正四維皆合於十五張衡曰律厯卦候九宫風角數有徴效魏伯陽曰土王四季羅絡始終青赤白黒各居一方皆稟中宫戊巳之功又曰太乙乃君移居中州内經有𤯝於三東方𤯝於九南方𤯝於七西方𤯝於一北方𤯝於四維厯攷諸家皆以為九宫之數初未嘗以此為洛書也圖書之所指既如彼二數之稱名又如此兩者判然不相及至宋而方士牽强扭合儒者又従縁飾以為授受之秘而漢唐以來之議論一切抹煞矣當日歐陽子之所謂怪妄者猶是漢儒之説第以龍馬神龜為不經耳若二數乃日者之常談且不足怪妄之矣奈之何旋毛圻文之附㑹紛紛如䆿語也且圖書亦自有辨天地之數固命之為圖九宫之數是亦一圖也豈可為書漢儒圖則言畫書則言文猶致嚴於名實此則不暇自掩其失矣圖書三劉牧謂河圖之數九洛書之數十李覯張行成朱震皆因之而朱子以為反置一證之邵子曰圓者星也厯紀之數其肇於此乎方者土也畫州井地之法其放於此乎葢圓者河圖之數方者洛書之文然鶴山辨之曰邵子但言方圓之象不指九十之數若以象觀之則九又圓于十矣且星少陽土少柔偶者為方為隂竒者為圓為陽十偶而九竒邵子之言反若有助於牧也再證之闗子明曰河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右然闗子明偽書也不可為證劉因為之解曰偽闗氏之書者非偽後人之托夫闗氏也葢偽其自作者託之於聖人也則又不然闗氏書亡阮逸偽作安見非後人之托夫闗氏乎三證之大戴禮明堂篇有二九四七五三六一八鄭氏注云法龜文也然鄭𤣥注小戴禮未嘗注大戴禮在藝文志可攷今之所傳亦後人假托為之也其疏畧不出於鄭氏明矣況鄭氏明言河圖九篇洛書六篇豈又以九宫為洛書自背其説哉凡此數證皆不足以絀牧在宋以前二數未嘗有圖書之名安得謂此九彼十至於劉邵則同出希夷授受甚明若彼此異同所傳者亦復何事故以十為圖九為書者特始於朱子後之諸儒相率而不敢違耳就二數通之於易則十者有天一至地十之繫可據九者並無明文此朱子爭十為河圖之意長於長民也雖然自一至十之數易之所有也自一至十之方位易之所無也一三五七九之合於天二四六八十之合於地易之所有也一六合二七合三八合四九合五十合易之所無也天地之數易之所有也水火木金土之生成易之所無也試盡去後人之添入依經為説則此數仍於易無與而況名之為河圖乎圖書四世之言五行者莫不本於生成之數皆以為造化之自然無容復議也某則以九流之失由此數失之於始夫太虚絪緼相感止有一氣無所謂天氣也無所謂地氣也自其清通而不可見則謂之天自其凝滯而有形象則謂之地故曰資始資生又曰天施地生言天唱而不和地和而不唱今所謂生者唱也所謂成者和也一三五天之生數六八十地之成數二四地之生數七九天之成數是天唱而復和地和而復唱真若太虚之中兩氣並行天氣地氣其為物貳矣是故一氣之流行無時而息當其和也為春是木之行和之至而温為夏是火之行温之殺而涼為秋是金之行涼之至而寒為冬是水之行寒之殺則又和木火金水之化生萬物其凝之之性即土葢木火金水土目雖五而氣則一皆天也其成形而為萬物皆地也若以水木土天之所生火金地之所生則春冬屬天夏秋屬地五行各有分屬一氣循環忽截而為天忽截而為地恐無此法象矣原其一水二火三木四金五土不過以質之輕重為數之多寡第之先後故土重於金金重於木木重於火火重於水然方其為氣豈有輕重之可言未聞涼重於温寒輕於和也則知天一至地十之數於五行無與矣是故言五行天生地成可也言地生天成不可也言竒數屬天偶數屬地可也言某行屬竒數某行屬偶數不可也此千古不解之惑儒者不免況於術數家乎圖書五天一至地十之數儒者必欲言聖人則之以畫卦崔憬曰三天者謂従三始順數而至五七九不取於一兩地者謂従二起逆數而十八六不取於四艮為少陽其數三坎為中陽其數五震為長陽其數七乾為老陽其數九兑為少隂其數二離為中隂其數十㢲為長隂其數八坤為老隂其數六劉長民曰水六金九火七木八而生八卦此坎離震兑四卦六居坎而生乾謂三為坎三為乾也九居兑而生坤謂三為兑六為坤也七居離而生㢲謂三為離四為㢲也八居震而生艮謂三為震五為艮也朱子曰河圖之虚五與十者太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兑震㢲艮者八卦也同此一數而三家所指不同如此配卦之論始於崔憬憬但言其數不言其位乾坤震㢲數有可據其附㑹者坎離艮兑耳長民兼位數而言六為水而坎屬之七為火而離屬之八為木而震屬之九為金而兑屬之以四卦之五行遷就其位數未為不可至於乾坤艮㢲則不可通矣朱子主先天之説以乾南坤北者伏羲之卦位也離南坎北者文王之卦位也河圖出於宓戲其時尚無離南坎北之位硬以乾南坤北配之則更無一合者矣天下之物一人以為然千萬人以為然其為物也不逺矣一人可指之為此又一人可指之為彼其為物也無定名矣故以天地之數配八卦者皆非定名也圖書六龍圖序見於宋文鑑以十為河圖朱子辨劉牧九為河圖之非不取此為證者以其為假書也見語𩔖故劉靜修曰龍圖之説未必出於劉牧之前吕伯恭従而誤信之猶張敬夫為戴氏師愈所欺也希夷未聞有書傳至邵子而後有書宋景濂以為不然曰龍圖序非圖南不能作也張理註以第一圖為未合之位第二圖為已合之位葢不知序言後既合也為第三圖又以天一居上為道之宗一語誤解在南為上於是第二圖上位置一於南置二於北置四於東置三於西以之合於下位則二六居下一七居上四八居左三九居右不可通矣乃言當如太乙遁甲隂陽二局以一二三四為天盤在上隨時運轉六七八九為地盤布定不易以一在南動而右轉初交一居東南二居西北三居西南四居東北再交一東北二西南三東南四西北然後為生成之位即朱子河圖三交一西北二東南三東北四西南四交一西南二東北三西北四東南再轉則一復於南如此則龍圖已合者且有六圖不勝支離葢不知天一居上之上謂上位也某故正之以復希夷之舊然序之為説固不能無疑謂河出未合之圖伏戲合而用之是伏戲畫卦又畫圖矣繫辭天數二十有五積一三五七九而得之地數三十積二四六八十而得之今上位分為一二三四五十下位分為六七八九則天數雜地數之中地數雜天數之中上得六位下得四位無乃天數六地數四乎既以其數託之於易又與易背宜乎朱子以為假也龍圖序且夫龍馬始負圖出於羲皇之代在太古之先也今存已合之位或疑之況更陳其未合之數耶然則何以知之答曰於仲尼三陳九卦之義探其㫖所以知之也九卦謂履謙復恒損益困井㢲之九卦也已合之位即今之所謂河圖是也自未合至已合其圖有三亦猶九卦之三陳也於九卦之義無取況夫天之垂象的如貫珠少有差則不成次序矣故自一至於盈萬皆累累然如係之於縷也且若龍圖本合則聖人不得見其象所以天意先未合而形其象聖人觀象而明其用是龍圖者天散而示之伏羲合而用之仲尼黙而形之未合之位為河之所出已合之位為伏羲所成始龍圖之未合也惟五十五數上二十五天數也中貫三五九句外包之十五盡天三天五天九并十五之用後形一六無位上位去一下位去六又顯二十四之為用也兹所謂天垂象矣中貫三五九者以第一圖而論中五之従三是中貫三也中五之居中是中貫五也上五中五下五之従是中貫九也去其所従之九又去無位之一而分之四方中央則凡五行之生數皆天數之所成為第二圖也下三十地數也亦分五位五位言四方中央也皆明五之用也上位形五下位形六十分而為六五位六五三十數也形坤之象焉坤用六也六分而成四象成七九八六之四象地六不配謂中央六也一分在南邉六成少陽七二分在東邉六成少隂八三分在西邉六成老陽九惟在北邉六便成老隂數更無外數添也以三十分作五位每位得六為第一圖取中央之六分其一配南為七分其二配東為八分其三配西為九中央更無餘分故下六不配凡五行之成數皆地數所分為第二圖也在上則一不用形二十四在下則六不用亦形二十四上位中心去其一下位中四下位中心去其六亦見二十四以一嵗三百六旬周於二十四氣也故隂陽進退皆用二十四天數二十五去其従九猶存十六於生數十五之中則一不用生數雖十五而天數固二十五也一不用則二十四地數中央之六分配四方六即不用數仍三十也然依原位四方各六則中六不用形為二十四後既合也天一居上為道之宗地六居下為氣之本一六上下覆載之中運四十九之數為造化之用也此第三圖合上下位而為一也天一居上以在上位故謂之上地六居下以在下位故謂之下非言一南而六北也天三幹地二地四為之用此更明九六之用謂天三統地二地四成九為乾元之用也九幹五行成數四十是謂大衍之數五十其用四十有九也五行成數六七八九十積之得四十以九加之合大衍用數三若在陽則避孤隂在隂則避寡陽成八卦者三位也謂一三五之三位二與四只兩位兩位則不成卦體是無中正不為用也在陽則為孤隂四二是也在隂則為寡陽七九是也三皆不處之若避之也一三五則三在陽六八十則三在隂大矣哉龍圖之變岐分萬塗今畧述其梗概焉先天圖邵子先天横圖次序以易有太極是生兩儀兩儀生四象四象生八卦為據黄東𤼵言生兩生四生八易有之矣生十六生三十二易有之否耶某則據易之生兩生四生八而後知横圖之非也易有太極是生兩儀所謂一隂一陽者是也其一陽也已括一百九十二爻之竒其一隂也已括一百九十二爻之偶以三百八十四畫為兩儀非以兩畫為兩儀也若如朱子以第一爻而言則一隂一陽之所生者各止三十二爻而初爻以上之竒偶又待此三十二爻以生隂陽者氣也爻者質也一落於爻已有定位焉能以此位生彼位哉兩儀生四象所謂老陽老隂少陽少隂是也乾為老陽坤為老隂震坎艮為少陽㢲離兑為少隂三竒者老陽之象三偶者老隂之象一竒二偶者少陽之象一偶二竒者少隂之象是三畫八卦即四象也故曰八卦成列象在其中矣八卦以象告此質之經文而無疑者也又曰易有四象所以示也又曰彖者言乎象者也今觀彖傳必𤼵明二卦之徳則象之為三畫八卦明矣是故四象之中以一卦為一象者乾坤是也以三卦為一象者震坎艮與㢲離兑是也必如康節均二卦為一象乾離坎坤於四象之位得矣兑之為老陽震之為少隂㢲之為少陽艮之為老隂無乃雜而越乎易言陽卦多隂隂卦多陽震艮之為陽卦㢲兑之為隂卦可無疑矣反而置之明背經文而學者不以為非何也至於八卦次序乾坤震㢲坎離艮兑其在説卦者亦可據矣而易為乾一兑二離三震四㢲五坎六艮七坤八以縁飾圖之左隂右陽學者信經文乎信傳注乎四象生八卦者周禮太卜經卦皆八别皆六十四占人以八卦占筮之八故則六十四卦統言之皆謂之八卦也葢内卦為貞外卦為悔舉貞可以該悔舉乾之貞而坤乾震乾㢲乾坎乾離乾艮乾兑乾該之矣以下七卦皆然證之於易曰八卦定吉凶若三畫之八卦吉凶何従定乎曰包犧氏始作八卦其下文自益至夬所取之十卦已在其中則八卦之該六十四亦明矣由是言之太極兩儀四象八卦因全體而見葢細推八卦即六十四卦之中皆有兩儀四象之理而兩儀四象初不畫於卦之外也其言生者即生生謂易之生非次第而生之謂康節加一倍之法従此章而得實非此章之㫖又何待生十六生三十二而後出經文之外也其謂之先天者以此章所生八卦與前章始作八卦其文相合以為宓戲之時止有三畫而無六畫故謂之先天又以己之意生十六生三十二生六十四倣此章而為之以補羲皇之闕亦謂之先天不知此章於六十四卦已自全具補之反為重岀易言因而重之生十六生三十二生六十四是積累而後成者豈可謂之重乎既不難明背何止如東𤼵言非易之所有耶先天圖二邵子先天方位以天地定位山澤通氣雷風相薄水火不相射八卦相錯為據而作乾南坤北離東坎西震東北兑東南㢲西南艮西北之圖於是為之説曰數往者順若順天而行是左旋也皆已生之卦也乾一兑二離三震四生之序也震初為冬至離兑之中為春分乾末交夏至故由震至乾皆已生之卦知來者逆若逆天而行是右行也皆未生之卦也㢲五坎六艮七坤八生之序也㢲初為夏至坎艮之中為秋分坤末交冬至故由㢲至坤皆未生之卦又倣此而演之以為六十四卦方位夫卦之方位已見帝出乎震一章康節舍其明明可據者而於未嘗言方位者重出之以為先天是謂非所據而據焉天地定位言天位乎上地位乎下未聞南上而北下也山澤通氣山必資乎澤澤必出乎山其氣相通無往不然奚取其相對乎雷風相薄震居東㢲居東南遇近而合故言相薄逺之則不能薄矣東北為寅時方正月豈雷𤼵聲之時耶水火不相射南方炎北方寒猶之冬寒夏熱也離東坎西是指春熱秋寒誰其信之此皆先儒所已言者某則即以邵子所據者破邵子之説帝出乎震之下文動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮其次序非即上文離南坎北之位乎但除乾坤於外耳而繼之以故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也然則前之天地定位四句正為離南坎北之方位而言也何所容先天之説雜其中耶且卦爻之言方位者西南皆指坤東北皆指艮南狩南征必為離西山西郊必為兑使有乾南坤北之位在其先不應卦爻無䦨入之者康節所謂已生未生者因横圖乾一兑二之序乾一兑二之序一人之私言也則左旋右行之説益不足憑耳凡先天四圖其説非盡出自邵子也朱震經筵表云陳摶以先天圖傳种放放傳穆修修傳李之才之才傳邵雍放以河圖洛書傳李溉溉傳許堅堅傳范諤昌諤昌傳劉牧故朱子云宓戲四圖其説皆岀邵氏然觀劉牧鈎深索隠圖乾與坤數九也震與㢲數九也坎與離艮與兑數皆九也其所謂九數者天一地八定位山七澤二通氣雷四風五相薄水六火三不相射則知先天圖之傳不僅邵氏得之也天根月窟康節因先天圖而創為天根月窟即㕘同契乾坤門户牝牡之論也故以八卦言者指坤震二卦之間為天根以其為一陽所生之處也指乾㢲二卦之間為月窟以其為一隂所生之處也程前村直方謂天根在夘離兑之中是也月窟在酉坎艮之中是也引爾雅天根氐也長楊賦西壓月窟證之然與康節乾遇㢲時觀月窟地逢雷處見天根之詩背矣以六十四卦言者朱子曰天根月窟指復姤二卦有以十二辟卦言者十一月為天根五月為月窟其三十六宫凡有六說以八卦言者三乾一兑二離三震四㢲五坎六艮七坤八之次序積數為三十六乾一對坤八為九兑二對艮七為九離三對坎六為九震四對㢲五為九四九亦為三十六乾畫三坤畫六震坎艮畫各五㢲離兑畫各四積數亦三十六以六十四卦言者二朱子曰卦之不易者有八乾坤坎離頥中孚大過小過反易者二十八合之為三十六方虚谷回曰復起子左得一百八十日姤起午右得一百八十日一旬為一宫三百六十日為三十六宫以十二辟卦言者一鮑魯齋恂曰自復至乾六卦陽爻二十一隂爻十五合之則三十六自垢至坤六卦隂爻二十一陽爻十五合之亦三十六陽爻隂爻總七十二以配合言故云三十六按諸説推之其以陽生為天根隂生為月窟無不同也葢康節之意所謂天根者性也所謂月窟者命也性命雙修老氏之學其理為易所無故其數與易無與也八卦方位離南坎北之位見於經文而卦爻所指之方亦與之相合是亦可以無疑矣葢畫卦之時即有此方位易不始於文王則方位亦不始於文王故不當云文王八卦方位也乃康節必欲言文王因先天乾南坤北之位改而為此朱子則主張康節之説過當反致疑於經文曰曷言齊乎㢲不可曉曰坤在西南不誠東北方無地曰乾西北亦不可曉如何隂陽來此相薄曰西方肅殺之氣如何言萬物之所説凡此數説有何不可曉㢲當春夏之交萬物畢出故謂之齊觀北地少雨得風則生氣郁然可驗也夏秋之交土之所位故坤位之非言地也若如此致難則先天方位㢲在西南何不疑東北無風耶其餘七卦莫不皆然乾主立冬以後冬至以前故隂陽相薄觀説卦乾之為寒為氷非西北何以置之萬物告成於秋如何不説朱子注元亨利貞之利曰利者生物之遂物各得宜不相妨害於時為秋於人為義而得其分之和非説乎顧未嘗以肅殺為嫌也然則朱子所以致疑者由先天之説先入於中故曰主張太過也康節曰乾坤交而為泰言文王改先天圖之意先天乾南坤北交而為泰故乾北坤南坎離交而為既濟先天離東坎西交而為既濟故離南坎北乾生於子先天乾居午而其生在子故下而至北坤生於午坤居子而其生在午故上而至南坎終於寅坎當申交於離故終寅離終於申離當寅交於坎故終申所謂交者不取對待言之也即以對待而論則乾南坤北者亦必乾北坤南而後泰之形可成也今坤在西南乾在西北離東坎西者亦必離西坎東而後既濟之形可成也今離在上坎在下於義何居藉曰再變而後為今位是乾南坤北之後離南坎北之前中間又有一方位矣乾位戌坤位未坎位子離位午於子午寅申皆無當也康節又曰震兑始交者也陽本在上隂夲在下陽下而交於隂隂上而交於陽震一陽在下兑一隂在上故為始交故當朝夕之位坎離交之極者也坎陽在中離隂在中故為交之極故當子午之位四正皆為用位㢲艮不交而隂陽猶雜也㢲一隂在下艮一陽在上適得丄下本然故為不交故當用中之偏乾坤純陽純隂也故當不用之位東方陽主用西方隂為不用夫氣化周流不息無時不用若以時過為不用則春秋不用者子午冬夏不用者夘酉安在四正之皆為用位也必以西南西北為不用之位則夏秋之交秋冬之交氣化豈其或息乎康節又曰乾坤縦而六子横易之本也先天之位震兑横而六卦縦易之用也由前之説則後自坎離以外皆横也由後之説則前自坎離以外皆縦也圖同而説異不自知其遷就與是故離南坎北之位本無可疑自康節以為従先天改出牽前曳後始不勝其支離朱子求其所以改之之故而不可得遂至不信經文吁可怪也納甲世言納甲本於㕘同契然京房積筭已言分天地乾坤之象益之以甲乙壬癸甲壬陽入乾乙癸隂入坤震㢲之象配庚辛庚陽入震辛隂入㢲坎離之象配戊巳戊陽入坎已隂入離艮兑之象配丙丁丙陽入艮丁隂入兑是則西漢之前已有之矣魏伯陽因其説而以月象附㑹之㕘同契曰三日出為爽震庚受西方八日兑受丁上弦平如繩十五乾體就盛滿甲東方十六轉就緒㢲辛見平明艮直於丙南下弦二十三坤乙三十日東方喪其明壬癸配甲乙乾坤括始終虞翻注易亦祖伯陽葢以月之明魄多少取象於卦畫而以所見方位為所納之甲趙汝楳駁之曰晝夜有長短晝短日沒於申則月合於申望於寅晝長則日沒於戌則月合於戌望於辰十二月間三日之月未必晝見庚十五日之月未必盡見甲合朔有先後則上下絃未必盡在八日二十三日望晦未必盡在十五日三十日震㢲位於西兑艮位於南乾坤位於東與大傳之卦易位兑畫陽過隂艮畫隂過陽不能均平與上下絃月體相符朱風林升亦云以乾三畫純陽為望以坤三畫純隂為晦其明魄消長當以五夜當一畫則震當為初五夜之月而非生明兑當為初十夜之月而非上弦望後㢲艮亦然此月之明魄與卦畫不類也地之方位甲庚相對既以望夕之月為乾而出甲則初生之月不見於庚矣上下弦之昏旦同見於南方之中亦初無上弦見丁下弦見丙之異也況月之行天一嵗十二月其昏旦出見之地夜夜推移無定位可指來月所納之甲非今月所納之甲矣某以為坎為月則月者八卦中之一也八卦納甲而専屬之月可乎同此八卦或取象於昏或取象於旦亦非自然之法象也故沈存中不主月象謂是天地胎育之理乾納甲壬坤納乙癸者上下包之也六子包於腹中其次第震㢲宜納丙丁艮兑宜納庚辛今反是者卦自下生先初爻次中爻末上爻是以長下而少上也某又不然甲乙至壬癸乃先後之次第非上下之次第也震㢲庚辛艮兑丙丁是亂其先後矣不得以爻為解以方位言之乾金坤土震木㢲木坎水離火艮土兑金在説卦可證今乾納甲壬坤納乙癸其為木耶水耶震㢲之為金坎離之為土艮兑之為火將安所適従耶若置之不論則又無庸於納矣納甲二卦之納甲以六十甲子言故納辰亦謂之甲也十二支六陽六隂陽順傳隂逆傳子寅辰午申戌為順未巳夘丑亥酉為逆乾起初爻納子順傳六爻則陽支畢坤起初爻納未逆傳六爻則隂支畢震得乾初初爻納子坎得乾二初爻納寅艮得乾三初爻納辰皆順傳六爻㢲得坤四初爻納丑先外卦而後内卦亦逆也離得坤三初爻納夘逆中之逆兑得坤二初爻納已皆逆傳六爻或謂陽順隂逆者非也特左右行耳隂陽雖判未嘗不交唯交故左右行五行用數一居北自左而右二居南自右而左故乾左行起子至戌坤右行起未至酉六卦則以子丑寅夘辰巳為初爻之序亦陽左隂右乾坤為父母故各據隂陽之半六子以類従㢲離兑初爻當納未巳夘坤内卦今納丑夘巳坤外卦者坤順承天妻道也妻不敢敵夫以率諸女故初爻則隨父左行自二爻以往始右行以従母重卦之納甲内卦觀下三爻外卦觀上三爻内外交錯以成之如乾下坤上内卦則子寅辰外卦則丑亥酉是故納十日者總以卦納十二辰者析於爻卜筮家舍納甲則休咎無以辨矣然觀其所用五行惟十二辰而十干無與焉卦為體爻為用干為主辰為客有用而無體舍主而用客則是失輕重之倫也假如生在卦克在爻自當去爻而従卦干則凶支則吉豈得昧大而見小納甲之説將古有其名而無其實與抑傳之者失其真與不然乾初爻止當云子為水不必配為甲子坤初爻止當云未為土不必配為乙未既配以甲乙自當用其五行矣且姑置納日之用不用甲為五行之全數卦為天地之全數今以四十八爻而納六十甲所餘之十二甲將焉置之豈卦不足以包五行耶季彭山曰陽卦納陽於陽支皆順行隂卦納隂於隂支皆逆行乾起甲子則坤當起乙丑今為改正羲按坤起乙未自京氏積算已然葢隂生於午故従未而起彭山不知而作往往如此近又有改納甲者戊巳干支十二虚中不用以離納甲坎納乙兑納丙艮納丁震納庚㢲納辛乾納壬坤納癸各納其干内所有之支自下而上如納甲者甲子甲戌甲申甲午甲辰甲寅是其所有也餘倣此此皆無所證據輕改古法納音六十甲子納音亦従納甲而生一律納五音十二律納六十音也納音雖同而立法有三其本之内經者五音始於金傳火傳木傳水傳土其叙也乾納甲坤納癸為之始終故納始於乾金終於坤土同位娶妻隔八生子甲子金之仲三元首仲次孟次季娶乙丑下生壬申金之孟娶癸酉上生庚辰金之季娶辛巳下生戊子火自戊子己丑轉丙申丁酉轉甲辰乙巳火之仲孟季畢焉自壬子癸丑轉庚申辛酉轉戊辰己巳木之仲孟季畢焉自丙子丁丑轉甲申乙酉轉壬辰癸巳水之仲孟季畢焉自庚子辛丑轉戊申己酉轉丙辰丁巳土之仲孟季畢焉以上為陽律起甲午乙未轉壬寅癸夘轉庚戌辛亥皆金也戊午己未轉丙寅丁夘轉甲戌乙亥皆火也壬午癸未轉庚寅辛夘轉戊戌己亥皆木也丙午丁未轉甲寅乙夘轉壬戌癸亥皆水也庚午辛未轉戊寅乙夘轉丙戌丁亥皆土也以上為陽吕此一法也葛稚川曰子午屬庚納甲震初爻庚子庚午丑未屬辛㢲初爻納辛丑辛未寅申屬戊坎初爻納戊寅戊申夘酉屬己離初爻納己夘己酉辰戌屬丙艮初爻納丙辰丙戌己亥屬丁兑初爻納丁巳丁亥一言得之者宫與土所屬者即是一言而得三言得之者徴與火如戊子戊午戊之去庚數此之有三也餘準五言得之者羽與水如丙子丙午丙之去庚為數五也七言得之者商與金如甲子甲午甲之去庚為數七九言得之者角與木如壬子壬午壬之去庚為數九此一法也子午之數九九者黄鐘之數子為十一月其律黄鐘午為子衝故其數同丑未八丑十二月故殺子九寅申七夘酉六辰戌五己亥四甲巳之數九甲為子干己為甲妃其數同乙庚八丙辛七丁壬六戊癸五揚子雲太𤣥之數其推納音以火土木金水為序甲子乙丑金者甲九子九乙八丑八積三十四以五除之餘四故為金丙寅丁夘火者丙七寅七丁六夘六積二十六以五除之餘一故為火餘準此此一法也按律書同位娶妻如黄鍾與大吕同位為妻隔八生子黄鍾三分損一隔八生林鍾為子今甲子黄鍾與乙丑大吕同位謂之娶妻是矣而甲子之隔八為辛未林鍾何以甲子不能生之也蔡邕云陽生隂為下生隂生陽為上生今陽不能生是但有上生而無下生也以甲子為上癸亥為下則又皆下生而上生無十之一二也内經之法與律書不能盡合矣稚川言中央總黄天之氣一南方丹天之氣三北方𤣥天之氣五西方素天之氣七東方蒼天之氣九皆竒數而無偶數而一之屬土三之屬火五之屬水七之屬金九之屬木亦不知其何義也揚子雲謂子之數九従黄鍾之管則丑當従林鍾而六寅當従太簇而八十二月各有其律何以有従有不従耶是故必欲定納音之法當以京房六十律與甲子分配以之上生下生始無敝耳葛稚川納音圖一言宫屬土庚子庚午辛丑辛未戊寅戊申己夘己酉丙辰丙戌丁巳丁亥三言徴屬火戊子戊午己丑己未丙寅丙申丁夘丁酉甲辰甲戌乙巳乙亥五言羽屬水丙子丙午丁丑丁未甲寅甲申乙夘乙酉壬辰壬戌癸巳癸亥七言商屬金甲子甲午乙丑乙未壬寅壬申癸夘癸酉庚辰庚戌辛巳辛亥九言角屬木壬子壬午癸丑癸未庚寅庚申辛夘辛酉戊辰戊戌己巳己亥揚子雲積數納音圖甲子乙丑三十四甲申乙酉三十甲辰乙巳二十六丙寅丁夘二十六丙戌丁亥二十二丙午丁未三十戊辰己巳二十三戊子己丑三十一戊申己酉二十七庚午辛未三十二庚寅辛夘二十八庚戌辛亥二十四壬申癸酉二十四壬辰癸巳二十壬子癸丑二十八甲戌乙亥二十六甲午乙未三十四甲寅乙夘三十丙子丁丑三十丙申丁酉二十六丙辰丁巳二十二戊寅己夘二十七戊戌己亥二十三戊午己未三十一庚辰辛巳二十四庚子辛丑三十二庚申辛酉二十八壬午癸未二十八壬寅癸夘二十四壬戌癸亥二十占課今世揲蓍者少而火珠林之術盛行大概本於京氏卦棄其象數爻取于干支一卦為一世應於動静無與也一事為一門類於爻辭無與也然某觀京房易傳又與今世所行間有出入則亦失其傳也曰世應分為八宫乾震坎艮坤㢲離兑各主一宫所屬七卦自下而上以次受變變至五爻則上爻不可復變上爻為本宫之主故第六卦従五爻返至四爻變而復主卦之畫謂之游魂第七卦則内卦皆復主卦之畫謂之歸魂主卦以上爻為世其次五卦以變爻為世遊魂以四爻為世歸魂以三爻為世亦内卦之上爻也世之對為應初與四二與五三與上是也曰飛伏世爻所在見者為飛不見者為伏見者即世爻之納甲不見者八主卦取相反之納甲乾與坤反震與㢲反坎與離反艮與兑反五變卦取主卦之納甲變在一世取主卦一爻變在二世取主卦二爻餘歸此遊凖二卦取従變之納甲如乾宫遊魂従剥而變則取剥四納甲為伏歸魂従晉而變則取晉三納甲為伏餘凖此曰建以爻直月従世起建布於六位惟乾坎従初爻起乾起甲子坤起甲午一卦凡六月也曰積筭以爻直日従建所止起日如姤上九乙亥即以乙亥起上九為一日終而復始一卦凡百有八十日也術家以月為直符日為傳符指六爻所見之支當之非矣曰鬼為繫爻財為制爻天地為義爻天地即父母福徳為寳爻福徳即子孫同氣為専爻兄弟爻也即術家所定六親是也其定身爻視世爻之辰子午身居初丑未身居二寅申身居三夘酉身居四辰戌身居五己亥身居上而京氏無定身爻之例乾卦云水配位為福徳初爻甲子水乾之子孫木入金鄉居寳貝二爻甲寅木乾之財土臨内象為父母三爻甲辰土乾之父母火來四上嫌相敵四爻壬午火乾之官鬼金入金鄉木漸微五爻壬申金乾之兄弟宗廟上建戌亥乾本位謂上爻壬戌土若依術家則乾五為身爻乾上復為父母京氏皆不言者以世即身也世外復有身不已贅乎曰龍徳虎刑龍徳在十一月坎卦子左行虎刑五月在離卦午右行故依建之所厯龍徳起子至四月在巳虎刑繼之虎刑起午至十月在亥龍徳繼之術家見子即為龍徳見午即為虎刑失之逺矣術家又有青龍朱雀勾陳騰蛇白虎玄武六神以所占之日甲乙起青龍丙丁起朱雀戊起勾陳巳起騰蛇庚辛起白虎壬癸起𤣥武在龍虎為重出餘四神為増加也曰卦位初元士二大夫三三公四諸侯五天子上宗廟曰五星曰二十八宿皆従世爻入卦曰盈虚盈則三十有六虚則二十有八内外卦各分其半以其五行所屬起世爻巡於六位視與爻之納甲相生尅定其吉凶此皆術家之所無也八宫世應圖本宫一世二世三世四世五世遊魂歸魂乾宫金乾姤遯否觀剥晉大有震宫木震豫解恒升井大過隨坎宫水坎節屯既濟革豐明夷師艮宫土艮賁大畜損睽履中孚漸坤宫土坤復臨恭大壯夬需比㢲宫木㢲小畜家人益无妄噬嗑頥蠱離宫火離旅鼎未濟蒙渙訟同人兑宫金兑困萃咸蹇謙小過歸妹遊魂八卦伏鬼易十六卦不晉艮四丙戌大過坎四戊申明夷震四庚午取本宫為伏故别為圖中孚乾四壬午需兑四丁亥頥離四己酉訟㢲四辛未小過坤四癸丑歸魂八卦伏大有坤三乙夘隨㢲三辛酉師離三己亥漸兑三丁丑比乾三甲辰蠱震三庚辰同人坎三戊午歸妹艮三丙申易學象數論卷一
