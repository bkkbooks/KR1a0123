body:
  text: 易學象數論卷三餘姚黄宗羲撰原象聖人以象示人有八卦之象六畫之象象形之象爻位之象反對之象方位之象互體之象七者而象窮矣後儒之為偽象者納甲也動爻也卦變也先天也四者雜而七者晦矣吾觀聖人之繫辭六爻必有總象以為之綱紀而後一爻有一爻之分象以為之脉絡學易者詳分象而畧總象則象先之㫖亦晦矣劉長民鈎深索隠圖每談總象又雜四者而為言以是不免穿鑿附㑹之病羲故别著之以為象學東方蒼龍七宿角亢氐房心尾箕子丑月黄昏蒼龍入地故曰濳寅卯月角宿昏見天淵之分故曰在淵辰巳月蒼龍昏見天田星下故曰見龍在田午未月龍星昏中於天故曰在天申酉月大火西流龍將入地故曰夕惕戌亥月平旦龍見於東北晝晦其形故曰亢魏獻子問龍於蔡墨蔡墨曰周易有之在乾之姤云云若不朝夕見誰能物之龍非星也豈得朝夕見乎氷霜之候農功未施直方大田疇之經界也三之含章黍稷華秀也四之括囊穫稻納稼也五之黄裳授衣載績也上龍戰野塞向墐戸春秋傳曰凡土功龍見而畢務屯難之時凄然有墟墓之象盤大石桓豐碑所以下棺者林中墓木叢生之處上之泣血孝子也二之不字婺婦也五之屯膏取蕭祭脂也班如馬行别其類左氏有班馬之聲是也陽為師隂為弟子包為傳道擊為解惑氣稟如桎梏物欲如金夫玩物喪志徇聞見者困山無草木之為童為道日損獨露性真亦童也需為飲食農者飲食所自出也需郊需沙需泥需穴皆農事也血即洫字需血者致力於溝洫由是而嵗功成矣故得酒食以速客古者穴居農事興而出穴農事畢而入穴此四上之義也訟與獄異此亦一是非彼亦一是非皆訟也初之小有言枝葉之辯也二不能自持其説三唯諾無别白四如漢儒堅守師説五如孟子之闢楊墨上則小言破道直待得不見自家有是世間有非斯無訟矣天子六師將皆命卿故六爻皆軍將也將不從中制六五者中軍之佐而非天子内卦為行軍之象故曰師出曰在師中外卦為養兵之象左次者在閭左而不發田有禽者農隙講武開國承家者兵民不分也王者巡狩諸侯來朝皆畋獵講武故五爻皆諸侯也上之為无首者處在荒服逺於敎化非梗化也大畜小畜皆畜乾也遇艮而止其畜宜也風以散之而言畜者以風行天上則為罡風不能及下而下畜矣下三爻取畜牧為義初為始生之犢往來自恣故曰復自道二則已受羈靮故曰牽三則已在轅下故曰輿上三爻取畜積為義四言惕出五言富鄰上言既處其指一也西方七宿為白虎乾兑當之初當昴昴為白衣故素履二當畢昴畢間為天街故履道坦坦三當觜參觜為虎首故咥人四當奎奎為虎尾故云履虎尾五當婁在虎尾之上卦中言履者指此一爻故云夬履上當胃胃為天倉明則天下和平故云考祥否泰之往來一嵗之寒暑也兩卦内爻同為拔茅而時異泰之拔茅言拔地而生也野火燒不盡春風吹又生包荒之象无平不陂无往不復者薈蔚參差之貌否之拔茅言隕落而根撥也野有死麕白茅包之故包承包羞皆取用於茅也當泰則隂亦為美在人民則不富以鄰大道為公也在女則為帝乙之妹不自有其貴也在土則為城隍可以守禦也當否則陽亦無用四之委於天命五之憂亡上之望治徒袖手旁觀耳彖言大同爻則天下為家各親其親各子其子之事也故同必以族家庭為一族宗黨為一族山林為一族城市為一族軍旅為一族田野為一族其事同則其心不得不同離事以為同而後謂之君子大有者以覲禮為象无交害者覲亦交也大車所載之庭實在道者享於天子上公三享侯伯再享子男一享匪其彭者彭盛貌束帛加璧以致庭實匹馬卓上九馬隨之儀文盛矣而將之以恭敬匪僅儀文也交如者天子賜侯氏以車服答其貢賦也自天祐之者侯氏肉袒告聽事於廟門天子辭以歸寧也謙以五禮為象初屬吉禮祭祀之道求之於隂一謙也求之於陽一謙也故曰謙謙二屬凶禮哭踊皆鳴也无不利者大小通行之謂嘉禮以親萬民故屬之鄰者邦國賔禮以親邦國故屬之行師屬軍禮有鐘鼓曰伐故亦鳴也五禮以忠信為主三之一陽是也謙豫兩卦一禮一樂雷出地而後有聲故五為宫貞疾恒不死者陽氣不可滅而出也冥豫有渝者祀神之樂謂之冥豫渝則變其聲不用商也角如雉登木鳴初應震木而鳴也中聲所止而徵生宫天也徵地也磬鼓長而狹以象天股短而厚以象地二居中當徵故如石張羽為宫其細已甚則為靡靡之樂三之盱睢亡國之音也四則八音克諧故為朋盍震春也兑秋也初至四有離象三至上有坎象夏與冬也又互為艮巽六子皆備具乾坤之徳故元亨利貞爻以隨前為義初隨二二隨三三隨四四隨五五隨上不論比應初隨二中正故出門有功二隨三失初故係小子三隨四失二故係丈夫四隨五故有獲而凶五隨上詩云縶之維之于焉嘉客故孚于嘉上居天位人道已畢無所復隨則隨於神故有西山之享艮為門闕所謂象魏也㢲以申命有號令之義以號令縣之於象魏當蠱壞之時不得不以此感動人心先甲三日後甲三日周禮挾日而藏之鄭云從甲至甲謂之挾日此先甲後甲之義與臨似夾畫之震觀似夾畫之艮震為雷八月雷始收聲則非震之時矣故曰有凶艮為鬼門又為宫闕地上有木而為鬼門宫闕者天子宗廟之象故有盥薦之事臨本體為澤加坤其上是澤之厚者故水深而甘觀本體為風加坤其下是風之培者故能化及童女噬嗑有圜土之象九四寘之圜土者也初上則司冦之屬在圜土之中宜以困苦象之而二三四五皆言飲食何也周禮曰以圜土聚敎罷民先王之設刑官所以輔敎官之不逮非欲以斬刈之也以燕享祭祀之心革縲絏桎梏之事膚者膚鼎也腊肉者腊鼎也乾胏者二骨以並也乾肉者腵脩也陳鼎時膚為下故二噬膚腵脩主婦所設最後故五噬乾肉離有繼明之象而賁變離之四爻日月相抱持也其六爻皆有天文之象初當軫軫為車在下而未出地故曰舍車二當須女故曰賁其須須女之上為天漢三之濡如言天漢也四之白馬言天駟也五之束帛言織女也五居君位故以天孫當之白賁者西宫白帝也其象爼豆五隂為足一陽為牀由鼎而升於爼者為膚為魚貫魚者饋食禮魚用鮒十有五而爼縮載是也籩豆之實水土之品故有碩果五爻數竒故言魚上爻數偶故言果鼎爼竒而籩豆偶也剥復為本末陽在木上為末剥也陽在木下為本復也七日者剥之上九為一日反對之即復之上六為二日去復逺故迷六五為三日土再覆為敦隂氣重也六四為四日在七日之中故云中行六三為五日頻者中道而又往之謂六二為六日與復相近故休初九為七日七日似逺同一卦體故云不逺坤體本虚任人來往一陽横亘其下有闗之象天下之无妄者莫如五榖春稼秋穯時侯不爽或遭旱澇則无所用其耕穫菑畬有牛亦且繋之趨吉避凶人所同然雖甚愚者未嘗以求疾眚為事乃忽然而至是出於非望者也於是逐妄迷復喪其固有故惟置身於榮枯得喪之外而後能无妄三所繋之牛即畜畜六四之童牛在大畜居艮體為邑人在无妄居震體為行人大畜亦以畜牧為義下三爻皆取象於馬以乾為馬也有厲利已馬而病厲不可行者也二之説輹􅀢駕之馬也唯三為艮馬則知初二皆不艮矣三至上有離象故四為童牛艮為黔喙故五為豕牙艮象門闕是豕在牢牛在宫者也艮為徑路路在天上則為天衢何天衢者其天駟與卦中二陽養人四隂待養初不能養民惟剥民以自養如後世之君誅求無厭故二三顛拂無告亂世之民也上九分田制地徇民好惡故四五皆得其養雖待哺之民有若飢虎亦應之不倦治世之民也初六在㢲體㢲為本上六在己巳當㢲位㢲又為木二木在外以夾四陽四陽互體為二乾乾為君為父二木夾君父是棺椁之象養生者不足以當大事惟送死可以當大事送死不嫌於大過也孔子曰五十以學易可以無大過矣言可以無死也原始反終知死生之説故可以無死與朝聞夕死同一義矣坎為水又為月月臨子午則潮盛水與月同一氣也内三爻言水之在天地間外三爻言人之治水初六水始導源江河之坎窞也六三萬川歸之大海之坎窞也水為天地間大患在治之得人樽酒簋貳巡行治水者以勞之也五不盈九川滌源九澤既陂也徽纆黑索也叢棘聚大木若棘也治水用索挽木以塞決口皆不順水性故績用不成三嵗不得也明兩作在天為日在地為火内卦日也外卦火也初為始旦二為日中三為日昃日運於上人事作於下四之焚如心火上炎進退失序也五之沱若水為火所逼也王用出征兵猶火也不戢自焚君子退藏於宻猶火藏於木石而已自有此身不能離感應偽往則偽來誠往則誠來思慮纔動肺肝已見無一而非感也人惟求感人不求自感逆詐億不信見有人已故有往來不逆詐不億不信不信者吾亦信之往來之路窮斯之為真感君子以虚受人心尚為下而况於口舌乎蘇子瞻曰自其變者而觀之則天地曾不能以一瞬自其不變者而觀之則物與我皆無盡也人但知男女飲食之為恒事盡力與造化相摶造化以至變者為恒人以其求恒者受變苟知乾坤成毁不離俄頃則恒久之道得矣故爻多以飲食男女為象遯為重畫之㢲壯為重畫之兑㢲之象為雞故初之遯尾雄雞自斷其尾者也上之蜚遯風雨如晦雞鳴不已鼓翼而飛者也兑之象為羊統一卦而言之皆有羊象焉初者羊之足趾也羊以角觸而趾用其力故曰壯于趾晉有日行黄道之象内三爻為夜外三爻為晝夜行為人目所不見故摧如愁如遲明出海萬目睽睽此衆允也帝堯時日南至纒虚虚為䑕也六五矢得矢箭籌也用之以算日次角東方七宿之首自虚至此七宿日行一周天矣明夷有日食之象初在食限去合朔尚逺故曰三日不食二為初虧四為食甚五為復圓上為入地曰左股左腹者日月俱東行日遲月疾其食也日在右而月從左追及之故日食必先於左若日在左則與月不相及矣或問文中子家人之象子曰明内而齊外蓋離㢲之卦也一陽一隂相配於中有父母夫婦之象焦延夀以上爻為宗廟五為君在家人則君位為父矣睽有人死為鬼之象祖而薦馬故初言喪馬將葬甸人抗重而出重有主道遇主於巷者謂重也輿喪車也輿曳牛掣者所謂輪按軌以徐進馬悲鳴而跼顧也其人天且劓者括髪擁鼻而號哭也元夫尸也孝子不見親之形象於虞祭立尸遇元夫也膚膚鼎宗廟之祭内神也車中之鬼外神也蹇卦内艮為山城象也外坎為谿隍象也世道之壞起於人心當蹇難之時機械争勝天下皆往而不來靡然降服唯君子反身修徳固守名教有干城之象亦如燕盡降齊城獨莒即墨不肯下耳坎中之一陽即震下之一陽始包於坎中既而出坎為震若果核之仁變而為芽則甲拆矣坎為狐三狐故三爻也二以剛居中一陽貫於二隂之間似矢中之射之者髙墉之上六也上六柔也何以能射蓋剛已中狐無矢故柔分田授土於下貢税終事於上上與下交相損益者也損初舉趾粟米之征也九二利貞布縷之征也六三損人力役之征也四損民之疾苦者也百姓足君孰與不足故五有或益之龜不以天下自富故上有無家之譽益初大作受田而耕六二享帝春秋祈報國之大事在祀與農二爻皆養生之事也六三凶事送死之事也四之遷國封建諸侯各行井田也九五恵心以不忍人之心行不忍人之政也損益之道如此聖人逆知後世剥下奉上民不聊生不授田養民則上無益下之道矣民買田以自養又復重税驅而納之溝壑使下損無可損而後之俗儒猶曰十一而税先王之制也是上之於下非益之乃擊之也故以上九終焉兑為羊上卦之羊固矣而統卦皆有羊象爻中所言皆統卦之義也上為羊頄三以應之故曰壯頄非三為頄也四為羊臀初為羊趾莧陸羊所食之草羊善鳴得草故無號也彖辭勿用取女六爻皆以此為象女登車而金柅見繋是為不吉嫁娶之家必宴㑹賔客而庖中無魚臀肉無膚𤓰尚在杞羊餘惟角則不成禮矣其為牝雞索家不待言也聚天下之人心者莫如宗廟九五萃有位四海之内各以其職來祭四之大吉二之用禴吉萃也上六齎咨涕洟是王者大喪羣公萃而哭臨三之嗟如初之號若凶萃也此王者升中祭告之事允升者徳洽而後升也用禴者宗廟之祭也虗邑者名山之邑如春秋邴者鄭伯之所受命而祭泰山之邑是也將享岐山先宿其邑而後升也升階者築土為壇故有階也冥升者感格於冥冥也兑正秋而坎為冬兑之一隂象乎始秋之氣蔓草禾殺故為葛藟之困六三則秋冬之交蔓草葉脱而刺存焉故為蒺藜之困初六則在坎之下大寒之時也蔓為霜殺而靡有孑遺所存者株木而已此即井田之制故以名卦㢲為繩直坎為水區畫於水上者田也田以溝洫為主溝洫之水人即取汲為食井泥不食者溝洫不治涸而見泥荒田也故為鳥雀所不集井谷射鮒者水深而有魚可射也井渫井甃井冽皆我疆我理南東其畆者也井収勿幕者大有之年粒米狼戾當収歛而勿蓋藏也勞民勸相省耕省斂也若以井泉取義禽固不能入井有魚之井亦不多見矣革有爐鞴之象離火鼓鑄兑金而金從革也金成器則文彩生故虎變豹變黄牛之革橐籥也已日乃革已為土冶必用土也革言三就者黑濁之氣竭黄白之氣竭青白之氣竭然後可鑄也器敝改鑄之之為革天下亦大器也禮樂制度人心風俗一切變衰聖人起而革之使就我範圍以成器後世以力取天下仍襲亡國之政惡乎革初為鼎足二三四為鼎腹五為鼎耳上為鼎鉉凡烹飪之事自鑊升於鼎自鼎載於俎鼎不受烹者也彖傳以木㢲火烹飪也此因鼎以及烹飪非烹飪以鼎也顛趾出否雍人陳鼎於門外以告潔也鼎有實司馬司士升性於鼎中也耳革行塞者主人未迎鼎之時也折足覆餗者舉鼎入門佐食升之爼也折足非鼎牲體節折之謂之折爼自脊脅以外肩脅臑膞胳皆足也黄耳金鉉者牛鼎受一斛羊鼎五斗豕鼎三斗天子皆飾以黄金也雷之在天地間能生物亦能殺物笑言啞啞萬物之鬱結解也七日得隂不能錮陽也蘇蘇更生之貌言草木禽蟲也内三爻皆為生物雷將擊物其聲重濁為震泥上下不已物遇而傷焉為往來厲其擊物也若有鬼神憑之為震索索視矍矍外三爻皆為殺物艮為門闕兩艮為重門互坎為月重門不啓明月在庭静之至也其爻言輔頰不言口言身不言腹言夤限不言臍有背面而立之象四隂拂布狀背脅也上一陽為肩膞中一陽為脊背㢲為長女艮為門庭女自外而歸男家之象六禮必奠鴈放彖言女歸爻言鴻漸鴻者隨陽之鳥艮㢲界於子午鴻之去來應之地勢北髙南下干者水之涯磐者岸之下陸則及於岸南方之象也木者林木之髙陵者邱陵之際逵者天際北方之象也震為春兑為秋正嫁娶之時也下三爻明嫡妾之分二得中為嫡初與三皆娣姪也四之愆期謂請期也五為親迎婦入門也上爻婦見舅姑故承筐舅姑醴婦故刲羊豐亦為日食之象初之配主月也此在日食前月之望故雖旬无咎過旬則災離南方之卦五六月之交日在午未日食於井栁則斗宿逺而得見日中見昧日食之既也其應在大臣故折其右肱震東方之卦正二月之交日在亥戌日食於室壁則斗柄之指午未者逺而得見卦中兩斗異星也來章從固也閴其無入日入而人息也艮為闕門有次舍之象故内卦皆為即次三之焚次以近離火也離為科上槁則是巢而已非次舍也上卦本三陽有三矢象六來居之亡其一矢是為野鳥入室故有焚巢之變人生何在非逆旅豈能久居聖人以焚巢示象瑣瑣者世人經營求望之心爭城受禪皆瑣瑣也焚巢喪牛運數之在天者也中四爻之得失何足芥蔕乎㢲有爼象隂象足陽象牀上下二㢲為重爼凡易之言牀皆指爼豆而言非人所卧之牀也三為牀二為史巫初為主人三品牀上所設之牲也上又一牀亦宜加以鼎實六四在上卦是上爻所設之物也今設之於下卦之上不可復加故云喪其資斧兑為正秋之卦下三爻七月之象中二爻八月之象上二爻九月之象言和言孚者陽氣猶盛也秋於五音為商介者隂陽之介也剥則隂欲剥陽引則陽欲避隂衰落之侯也上㢲下坎有東風解凍之象辭離之後天地閉賢人隠故用拯馬壯以求巖穴之士相助為理机儿也既得賢才則使之几而崇禮之渙其躬所為學焉而後臣也當是時不知㡬人稱王㡬人稱帝聚而為羣吾從而涣之涣汗其大號者建立諸侯各有封號也涣其血者原野厭人之内川谷流人之血吾以不嗜殺人涣之也水澤何以謂之節也百川注海無澤以納之則水利不興旱澇為患内爻為興居之節互艮為門户初二兩陽若人處其中外爻為飲食之節安者五味相和自三至上五以一陽處於三隂之中坤之稼穡作甘也自二至五有離象火性炎上作苦故上為苦也中孚生陽羽族即生也咸卦生隂血肉之物胎生也中孚為生陽之始小過為生陽之成有嫗卵之象焉當燕之來鳥雀生卵之時也鶴鳴子和鶴以聲抱者也或鼓或罷或泣或歌調和伏卵之節也月㡬望其氣侯將至也有孚攣如卵已成形其爪尚攣也翰音登天則出鷇而鳴矣小過飛鳥之音即翰音也中二陽為鳥之腹背下二隂為左翼上二隂為右翼有東飛之象大道不行鳥獸之卵胎既不可俯闚飛而害之者至矣故初為飛鳥之凶三之或戕四之往厲五為矰繳上為網罟人世之險一至於此乾坤分六隂六陽而為坎離坎離合而為既濟未濟在六十四卦之中一律一吕可以相配者更無别卦既濟初為黄鐘黄鐘陽之始生曳輪濡尾象其初出之貌二為大吕隂為陽侣有婦女之義三為太簇其分野幽州故云鬼方四為夾鐘陽以隂為夾猶衣以袽為夾也五為姑洗百物滌故就新猶祭祀之齋戒也上為中呂濡其首者首陽而為隂所伏也未濟初為林鐘辟卦在遯濡尾即遯尾濡二為蕤賔隂為主陽為賔既為賔主是曳其輪而未行也三為南吕四隂盛長未可濟也四為夷則夷傷也故有伐鬼方之事五為應鐘㣲陽應而將復故有君子之光上為無射射厭也萬物之資陽氣無有厭射猶人之飲酒無厭射也易學象數論卷三
