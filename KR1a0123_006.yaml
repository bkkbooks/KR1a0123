body:
  text: 易學象數論卷六餘姚黃宗羲撰六壬一沈存中云六壬十二辰亥登明為正月將戌天魁為二月將古人謂之合神又謂之太陽過宮今日度隨黃道嵗差太陽至雨水方纒諏訾亥宮春分後纒降婁戌宮若用合神則須自立春便用亥將驚蟄便用戌將若用太陽則須照過宮時分不知所謂合神者厯元冬至之時天與日㑹於子中為十一月自後天順日逆左右分行天行丑日纒子為十二月天行寅日纒亥為正月天與日各歷十二辰辰異而月同謂之合神則合神者亥與戌也登明天魁是解正月二月之義於合神無與也唐虞之時冬至天與日㑹於丑宋元以來天與日㑹於寅古之所謂合神者已不相合矣今之六合非古之六合使立春而用亥驚蟄而用戌亦非合神也然惟天與日㑹於子中適在十一月故能建與纒合其後冬至自丑而寅而邜則天行亦不與次舍相應其所謂合神者日纒與天行乎天行與次舍乎是則兩者分為三矣周雲淵遂欲盡更諸將謂子月一陽生是謂大吉午月一陰生是謂小吉然不名其子午而名其丑未者以子月冬至太陽在丑故以丑為大吉午月夏至太陽在未故以未為小吉今太陽冬至在寅夏至在申當更以寅為大吉申為小吉此亦誤以大吉小吉為合神也大吉以十一月為義不因於丑小吉以五月為義不因於未是故以黃道嵗差當更合神不當更月將蓋十一月子十二月丑正月寅萬古不易之次舍也太陽纒子纒丑纒寅者嵗差之次舍也兩者不相蒙雲淵渾而一之故有此失存中又欲釐正厯法如東方蒼龍七宿當起於元終於斗南方朱鳥七宿起於井終於角西方白虎七宿起於婁終於輿鬼北方真武七宿起於東井終於奎經星改動亦是出此舍以入彼舍非東之寅卯辰移而至南南之己午未移而至西西之申酉戌移而至北北之亥子丑移而至東次舍不局於經星猶月將不局於合神也六壬二方伎家多託於上古無所徴信唯六壬見之吳越春秋子胥少伯皆精其術然與今世所傳亦復不同冷州鳩之對七律也即六壬之術其曰王以二月癸亥夜陳未畢而雨以夷則之上宮畢之當辰辰在戌上故長夷則之上宮名之曰羽所以藩屏民則也周二月丑為月建以其為日月所合之辰故名丑曰辰辰在戌上者以天盤之丑加於地盤之戌蓋武王畢陳之時在戌也丑既加戌則癸亥日辰乃在申上申為夷則亥以變宮加於其上故為夷則之上宮戌為無射羽也故名之曰羽又曰王以黃鍾之下宮布戎於牧之野故謂之勵所以勵六師也按牧誓時甲子昧爽王朝至於商郊牧野是時在寅也以天盤之丑加於地盤之寅則甲子日辰乃在丑上子為黃鍾而丑以宮處其下故為黃鍾之下宮丑為大呂子以宮加其上不曰大呂之上宮者以陰呂不可為唱也又曰以太簇之下宮布令於商昭顯文德底紂之多罪故謂之宣所以宣三王之德也日為丙寅時為子以天盤之丑加地盤之子則丙寅日辰上臨於丑寅為太簇而丑以宮處其下故為太簇之下宮又曰反及嬴內以無射之上宮布憲施舍於百姓故謂之嬴亂所以優柔容民也案汲冢周書時四月既旁生魄越六日庚戌武王朝至燎於周則王之反及嬴內在四月也周四月建卯以天盤之卯加地盤之丑則子以宮臨日辰之戌上戌為無射故曰無射之上宮其可考見者如此則並無四課三傳之說也而今之六壬亦絶不及五音十二律也豈久而失其傳與抑州鳩舉其大而不及其細與就以今術論之卜筮諸術皆以生為主以生為用壬則於十二時獨取夫辰以斗柄罡星嵗常指辰故謂辰為天罡辰建於三月而為八月之將金旺殺物之候以天地之殺為用故也其四課上克下曰元首下克上曰重審上下交相克曰知一涉害日辰遙相克曰蒿矢彈射伏吟反吟皆因衝克以為之名目此明與諸術相反故不取夫生而取夫殺不取夫德與合而取夫克與衝不取夫祿與旺而取夫刑與害則凡一書之中所以論吉凶者皆當取此而何所論非所主所主非所論所主者刑殺衝克所論者生旺德合所主者與諸術相出所論者與諸術相入豈失傳之中又失傳與宋咸言京郎關朗輩假易以行壬遁之學其時當不如是也六壬起例地盤布十二支為地盤以十干寄之甲寄於寅乙寄於辰丙戊寄於巳丁巳寄於未庚寄於申辛寄於戌壬寄於亥癸寄於丑五行家干之寄支各以類從戊巳為中央之土故隨丙丁而寄己午其辰戌丑未則空無所寄六壬避四正之位故不得不移乙於辰移丁巳於未移辛於戌移癸於丑天盤布十二辰於天盤正月亥登明二月戌天魁三月酉從魁四月申傳送五月未小吉六月午勝光七月巳太乙八月辰天罡九月邜太衝十月寅功曹十一月丑大吉十二月子神后沈存中以登明至神后為十二辰之名術家以為月將非也登明者正月三陽始兆天下文明天魁者斗魁第一星也其星抵戌從魁者斗魁第二星也其星抵酉傳送者四月陽極陰生傳隂而送陽也小吉者小為陰陰長為小者吉也勝光者王者向明而治光被四表也太乙者紫微垣所在天罡者斗剛所建太衝者日月五星之門戶天之衝也功曹者十月嵗功成而㑹計也大吉者大為陽陽長故大者吉也神后者其位居末在諸神之后也貴人視占時日干於天盤上求之卯辰巳午未申六時用陽貴甲在未乙在申丙在酉丁在亥戊在丑巳在子庚在丑辛在寅壬在卯癸在巳子丑寅酉戌亥六時用陰貴甲在丑乙在子丙在亥丁在酉戊在未巳在申庚在未辛在午壬在己癸在邜貴人者十干之合氣也其法以十干布十二支而不居辰戌虛其對衝以辰戌為貴人之獄對衝為天空也陽貴順布甲與巳合甲加子己加未故甲用未為貴人已用子為貴人乙與庚合乙加丑庚加申故乙用申為貴人庚用丑為貴人丙與辛合丙加寅辛加酉故丙用酉為貴人辛用寅為貴人丁與壬合丁加卯壬加亥故丁用亥為貴人壬用卯為貴人戊與癸合戊加己癸加丑故戊用丑為貴人癸用已為貴人陰貴逆布甲加申己加丑故甲用丑巳用申為貴人乙加未庚加子故乙用子庚用未為貴人丙加午辛加亥故丙用亥辛用午為貴人丁加巳壬加酉故丁用酉壬用已為貴人戊加卯癸加未故戊用未癸用卯為貴人甲之起於子申者貴人屬土正位丑未乃坤二五黃中之合氣先天卦之坤在正北子位河圖之坤在西南申方故晝夜分之以起甲也十二神將以天盤月辰加地盤時辰視貴人之在天盤者臨地盤何位地盤以己亥為界貴人臨辰亥一邊則順行天乙即貴人騰蛇朱雀六合勾陳青龍天空白虎太常真武太陰天后臨己戌一邊則逆行天乙天后太陰真武太常白虎天空青龍勾陳六合朱雀騰蛇皆加於天盤之上沈存中曰六壬十二神將以義求之止合十一貴人為之主其前有五將謂騰蛇朱雀六合勾陳青龍也此木火之神在方左者方左謂寅卯辰巳午其後有五將謂天后太陰真武太常白虎也此金水之神在方右者方右謂未申酉亥子唯貴人相對謂之天空如日之在天月對則虧五星對則逆行避之空無所有非神將也又曰十一將前二火二木一土間之後當二金二水一土間之真武合在後二太陰合在後三四課以天盤月辰加地盤時辰視地盤日干連上為第一課即以干上所得之支移入地盤名干陰又連上為第二課又視地盤日支連上為第三課即以支上所得之支後入地盤名支陰又連上為第四課一剋賊四課之中察其五行取相克為用先以下賊上地盤剋天盤為用若無下賊上即以上克下為用假如丙寅日功曹辰時四課卯丙丑卯子寅戌子地盤卯木剋天盤丑土即以之為用初傳丑卯再傳亥丑三傳酉亥謂之三傳二比用四課中或有二三四課上下相克陽日用陽比去陰不用陰日用陰此去陽不用假如丙寅日功曹加酉四課戌丙卯戌未寅子未內卯戌為上克下因有下克上故不用而未寅子未皆下克上未寅為陰比陰陽以天盤為主子未為陽比丙陽日故用子未為初傳已子為再傳戊巳為三傳三涉害四課中有二三四課為上克下克而與日或俱比或俱不比則看涉害視地盤孟仲季寅申巳亥為孟深子午邜酉為仲淺辰戌丑未為季尤淺取深者為用若俱深則剛日用日干上辰柔日用日支上辰假如已巳日功曹加未四課寅巳酉寅子巳未子皆上克下寅巳子巳為陽此酉寅未子為陰比已陰日不用陽比而兩陰比則視下之寅為孟子為仲故取酉寅為初傳辰酉為再傳亥辰為三傳假如戊辰日功曹加未時四課子戊未子亥辰午亥三下克上戊陽日除亥辰陰比不用子戊午亥俱陽比而地盤又俱孟深子戊乃日干上辰剛日故用為初傳四遙克四課中無上下克則取上神之克日者為用名蒿矢神不克日則取日之克上神者為用名彈射若日克兩神或兩神克日亦以比日者為用假如己巳日大吉加辰時四課辰巳丑辰寅巳亥寅上下皆不相克而寅巳是天盤寅木克日干已土也用為初傳此篙矢式又如辛未日大吉加亥四課子辛寅子酉未亥酉無克而日干辛金克天盤寅木用為初傳此彈射式五昴星四課中無克又與日干無相克陽日則從地盤酉仰視所得之神為用陰日則從天盤酉俯視所得之神移入天盤連下為用陽日以地盤日支連上為中傳日干用地盤日干所寄之支連上為末傳陰日以地盤日干連上為中傳日支連上為末傳與上四條自初即傳至末者異假如庚午日勝光加已四課酉庚戌酉未午申未無克又無遙克以剛日從地盤酉仰視得戌為初傳日支午從地盤午得未為中傳日干庚從庚所寄之申連上酉為末傳又如丁丑日小吉加戌四課辰丁丑辰戌丑未戌無克又無遙克以柔日從天盤酉俯視得子便移子入天盤連下卯為初傳日干丁從丁所寄之未連上辰為中傳日支丑從地盤丑連上戌為末傳六伏吟伏吟者子加子是也無克者剛以日干上神甲戌戊庚壬柔以日支上神丁巳辛為傳首皆以所刑為中傳以中傳所刑為末傳若傳首遇自刑者剛日初傳日日干所寄之支次傳支支所刑為末傳柔日初傳支次傳日日所刑為末傳次傳若更遇自刑者以次傳所衝為末傳六癸有克以克處為傳首首所刑為中傳中所刑為終傳癸柔日當用支上神有克故與剛同六乙亦有克而傳首遇自刑故初傳日次傳支末傳支所刑乙柔日傳首自刑當用支為初傳克在日故與剛日同例三刑子刑卯卯刑子謂之互刑寅刑己巳刑申申刑寅未刑丑丑刑戌戌刑未謂之遞刑辰刑辰午刑午酉刑酉亥刑亥謂之自刑儲華谷曰子卯一刑也寅巳申二刑也丑戌未三刑也自卯順至子自子逆至卯極十數而為無禮之刑寅逆至己巳逆至申極十數而為無恩之刑丑順至戍戌順至未極十數而為恃勢之刑皇極中以十為殺數故也七反吟反吟者子加午是也反吟多相克以比用涉害為例其不同者取初傳之衝為次取次傳之衝為末而已唯六日無克丁丑己丑辛丑則以登明為初傳丁未己未辛未則以太乙為初傳支未丑丑未為中傳干為末傳丑未辰戌八别責四課不全謂相重又無克無遙則用别責例剛日以干合之神視地盤為傳首柔日以日支三合之神視天盤日支順行隔三位者是為傳首中末皆以日寄之支為傳别責有九課剛日三課戊辰戊午丙辰柔日六課辛未辛丑各二丁酉辛酉干合甲巳乙庚丙辛丁壬戊癸三合寅午戌合火局申子辰合水局亥卯未合木局己酉丑合金局九八専四課中干支共位者别責三課八專兩課名八專惟兩課有克亦以比用涉害為例若無克剛日從日之陽神順數三神為用中末俱重在日上假如甲寅日功曹加已四課亥甲申亥亥寅申亥此干支皆同位也剛日從亥甲順數三神得丑辰為課首次末皆亥寅又如己未日太衝加辰四課午己巳午午未己午亦干支同位也柔日從己午逆數三神得卯辰為課首次末皆午未又有一課名獨腳者亦柔日八專也己未日登明加酉四課酉己亥酉酉未亥酉從亥酉逆數三神得酉未而酉未乃日上也三傳同在一課起年陽年以大吉加嵗支陰年以小吉加嵗支以四課三傳占十二邦國各得神將吉凶所主之事如戊戌陽年用大吉加戌四課為申戌亥申丑戌辰丑三傳起月以嵗合神加月建以占十二國神將吉凶成敗六壬透易置年月日時先以月將加時得四課三傳其三傳之在天盤者為一類在地盤者為一類以年干起五虎遁數天盤三傳得其所屬甲子視八卦納甲相同合之為上卦以日干起五鼠遁數地盤三傳得其所屬甲子視納甲相同合之為下卦上下相重為六畫之卦以大象為基世爻為命應爻為身大限陽年從世爻而上陰年從世爻而降十年一爻小限陽年從應爻而降陰年從應爻而升一年一爻周而復始陽年用陽貴陰年用陰貴五虎遁甲巳起丙寅乙庚起戊寅丙辛起庚寅丁壬起壬寅戊癸起甲寅五鼠遁甲巳起甲子乙庚起丙子丙辛起戊子丁壬起庚子戊癸起壬子假如辛酉年辛丑月丁亥日丙午時大吉加午四課寅丁酉寅午亥丑午三傳午亥丑午申丑年干辛丙辛遁起庚寅自下至辛丑其甲子皆為庚寅所屬午得甲午乾四納甲丑得辛丑㢲初納甲申得丙申艮三納甲合之得離為上卦日干丁丁壬遁起庚子自下至辛亥其甲子皆為庚子所屬亥得辛亥㢲二納甲午得丙午艮二納甲丑得辛丑㢲初納甲今之得震為下卦離震相重為噬嗑世在五爻為命應在二爻為身以陰年大限自五而四小限自二而三答王仲撝問冷州鳩七律對辛丑秋八月王仲撝過龍虎山相訪山空夜靜間談律厯仲撝因舉冷州鳩所言為問余謂此須以三統厯推之其言乃合而邢雲路强按以授時遂盡改其冬至朔日至於嵗月日星辰之所在亦未嘗推步徒以意相牽合耳豈足信哉然三統之術亦不傳其載在漢書者字數漏奪依之不能盡通余嘗欲著三統推法將使漢律厯志為有用之書今便推所問不特冷州鳩之言不誣而三統亦可因之發凡矣昔武王伐殷上元至伐紂之嵗己邜十四萬二千一百九嵗入人統五百二十一嵗凡推本年皆減一算獨三統所積是已減者不可更減積月六千四百四十三閏餘一十八積日十九萬二百六十七小餘二十九大餘七天正辛邜朔即周之正月也從統首甲申數之厯七位而後辛邜冬至大餘一百一十五小餘六十三案律厯志云以算餘乘入統嵗數盈統法得一名曰大餘不盈者名曰小餘今若依之必不能通蓋統法乃統母之誤耳大餘除六十為五十五從甲子起算得己未冬至冬至己未嵗在鶉火積次四百一十五次餘八十定次七從星紀起算至鶉火第八此正伐紂己邜嵗也邢雲路謂時殷之十一月戊子於夏為十月非是此時嵗猶在鶉首月在天駟前一年戊寅嵗周十二月積日十九萬二百三十七小餘六十七辛酉朔合晨三百七度在心三度月夜半在氐十二度二十八日戊子月在房五度天駟房宿也月行二十七日有竒仍還原宿今朔日在氐十二則二十八日過氐厯房案三統不立日月每日所在之術可謂疏矣武王於是日發師故言其日月之所在日在析木之津箕七度辰在斗柄合晨三百三十九度在斗一度此己邜周正月辛邜朔也星在天黿定見復數四十四萬七千八百六見復餘七千三百七十三積中法一百七十萬五千三百四中餘二萬七千六百八十八中元餘四萬三千一百八十四入章中數一百八十九見中次一次於𤣥枵星辰星也柄枵即天黿案律厯志云以元中除積中餘則中元餘也以章中除之餘則入章中數也以十二除之餘則星見中次也此三箇除字其法似乎一例而不知元中之除與十二之除皆為除去而言乃章中之除則除一章中當一數也元中與十二所除之餘所用在是章中之餘直棄之而已其餘字當衍積月一百七十萬五千三百一十九月中餘四萬一十五月元餘四萬九千二百七十四入章月數二百九見於天正用十二十三除入章月數恰盡故星見天正漢書以章月除月元餘則入章月數也此除字與上以章中除之之除同例積日六百八小餘一千三百八十七萬九千七百七十四辛邜朔案律厯志云以月法乘月元餘盈日法得一名曰積日餘名曰小餘小餘三十八以上月大數除積日如法算外則星見月朔日也此條差誤尤甚所謂月法者乃見月法所謂日法者乃見月日法小餘亦三千八十萬以上乃月大耳入中次日度數二十九從斗十二度至女七度為二十九度方盡星紀厯𤣥枵星與日辰之位皆在北維顓頊之所建也帝嚳受之我姬氏出自天黿及析木者有建星及牽牛焉則我皇妣大姜之姪伯陵之後逢公之所馮神也嵗之所在則我有周之分野也月之所在辰馬農祥也我太祖后稷之所經緯也王欲合是五位三所而用之自鶉及駟七列也南北之揆七同也凡神人以數合之以聲昭之數合聲和然後可同也故以七同其數而以律和其聲於是乎有七律王以二月癸亥夜陳未畢而雨以夷則之上宮畢之當辰辰在戌上故長夷則之上宮名之曰羽所以藩屏民則也周二月庚申朔積日十九萬二九六小餘七十二四日癸亥此即六壬月將加時之術也周二月丑為月建以其為日月所合之辰故名丑曰辰以天盤之丑加於地盤之戌蓋武王畢陳之時在戌也丑既加戌則癸亥日辰乃在申上申為夷則亥以變宮加於其上故為夷則之上宮戌為無射羽也故名之曰羽王以黃鐘之下宮布戎於牧之野故謂之厲所以厲六師也五日甲子案牧誓時甲子昧爽王朝至於商郊牧野是時在寅也以天盤之丑加於地盤之寅則甲子日辰乃在丑上子為黃鐘而丑以宮處其下故為黃鐘之下宮然丑為大呂子以宮加其上不曰大呂之上宮者以陰呂不可為唱也以太蔟之下宮布令於商昭顯文德底紂之多罪故謂之宣所以宣三王之德也七日丙寅以天盤之丑加地盤之子則丙寅日辰上臨於丑寅為太蔟而丑以宮處其下故為太蔟之下宮反及嬴內以無射之上宮布憲施舍於百姓故謂之嬴亂所以優柔容民也周四月己丑朔積日十九萬三八五小餘三十九案汲冢周書時四月既旁生魄越六日庚戌武王朝至燎于周則王之反及嬴內在四月也四月建巳以天盤之已加地盤寅則己丑日辰以宮臨於戌上戌為無射故曰無射之上宮太一太一緯書也蓋倣易厯而作其以一為太極因之生二目二目生四輔猶易之太極生兩儀兩儀生四象也又有計神與太乙合之為八將猶易之八卦也其以嵗月日時為綱而以八將為緯三基五福十精之類為經亦猶之乎厯也法以八將推其掩迫囚擊關格之類占人君將相內外災福又推四神所臨分野占水旱兵喪飢饉疾疫又推三基五福大小遊二限易卦大運占古今治亂天下離合如遇凶神陽九百六交限之際卦運災變之限大數凶者其凶發於八將掩迫囚擊關格之年如遇吉星所㑹之分卦象和平之運非陽九百六交限之際大數吉者八將雖有掩迫之類其災不發故占家以為聖書私相傳習然其間經緯渾淆行度無稽或分一為二或并二為一茫然何所適從也太一者天帝之神王希明曰太一在璿璣玉衡以齊七政隨天經行以斗抑揚故能馭四方此以中宮天極繫於經星者為太一也又曰太一者木神也東方木之監將嵗星之精受木德之正旺在春三月此以五緯木星為太一也斗魁戴匡六星曰文昌宮經星也填則土星也以主目文昌為填星土德之精是兼經緯而一之矣其所謂四神太一者欲擬太微宮之五帝而首天一不知天一乃紫微宮之星也十精天皇太一謂是紫微垣勾陳中星即天帝也既有小遊太一當之矣此之天皇無乃重出乎帝符為天節之吏天時為昴星之使飛鳥為朱雀之體八風為畢星之神三風五風為箕心之精二十八宿有所去取其間何也嵗星一嵗行一宮十二年一周天太一既為木精而一年理天一年理地一年理人每宮乃至三年所行宮次一為十二辰一為八卦位亦不相當也填星二十八嵗一周天天目既為土德而每宮一年乾坤二年十八年而一周所行宮次一為十二辰一為十六辰亦不相當也地目為火星熒惑之精火星二年一周二月而行一宮此則二宮一年或三宮一年主大將屬金客大將屬水水金俱一年一周天此則一年行三宮或一年行五宮經星之在天者皆一年一周天者也今姑置三基五福大遊其所指之恍惚者如四神之三十六天皇帝符之二十昴星之十二年一周朱雀箕畢之九年一周皆的然違天者也此皆以嵗計言之降而為日月時其不相應更不必論或曰假星名以寓術不必核其果否也若是則某不知之矣太一二太一九宮之數始於乾鑿度其時不名為洛書也而九前一後三左七右四前左二前右八後左六後右以離南坎北之方位配之其下行九宮與今所傳頗異鄭康成云太一下行八卦之宮每四乃還於中央中央者北神之所居故因謂之九宮陽起於子陰起於午是以太一下行九宮從坎始自此而從於坤宮又自此而從震宮又自此而從㢲宮所行半矣逺息於中央之宮既又自此而從乾宮又自此而從兑宮又自此從艮宮又自此而從離宮行則周矣上遊息於天一之宮而反於紫宮據此則太一一周兩入中宮今乃避五而不入則是八宮非九宮也紫宮者午位之離也反於紫宮所謂陰起於午則由此逆行自離而艮而兑而乾而中央而巽而震而坤而坎今並無逆行之法則是有陽生而無陰生也坎一坤二震三巽四乾六兑七艮八離九此九宮之序今宮法一乾二離三艮四震六兑七坤八坎九巽則是擾紀離次也靈樞曰太一常以冬至居叶蟄宮坎四十六日明日居天留艮如是而倉門震陰洛巽上天離𤣥委坤倉果兑新洛乾周而復始康成之子午亦謂十一月五月也太一皆一年一周今三年一宮二十四而一周又析之為月日時豈其有四氣並行耶太一從五行之氣無所偏倚故為獨貴今以木行當之豈能首出庶物耶其法有九宮貴神者坎太一坤攝提震軒轅巽招搖中天符乾青龍兑咸池艮太陰離天一蓋在坎則為太一在坤則為攝提九宮莫不皆然以坎起太一故以太一為總名每宮各有所屬是無偏於木行之失遇某宮直事則鈎入中宮八者分為鈎位是無五作空宮之失厯書三白圖法尚遵行之此於康成所云庶幾相近今别出之以為九宮太一不知其所謂太一者復何名耶太一推法嵗計周紀三百六十元法七十二第一甲子元第二丙子元第三戊子元第四庚子元第五壬子元置積年以周紀去之餘以元法而一為一元不滿元法者為入元以來年數月計置不滿周紀算減一以十二乘之加入所求之月是為積月太一行月以節氣為斷故不積閏日計嵗實三百六十五萬二千四百二十五分朔實二十九萬五千三百五分九十三秒閏限一十八萬六千五百五十二分九秒月閏九千六十二分八十二秒置積年減一以嵗實乘之得數滿朔實去之其不滿朔實者則是減一內之日謂之閏餘仍置嵗實所乘之數減閏餘此本年天正朔前之積日也以紀法約之知其末日甲子加入本年所求之日是為積日在正以後之月每月加一朔實一月閏於閏餘之內時計冬夏二至但逢甲子便為上元置二至以來積日減一以十二乘之加本日所求之時是為積時冬至後用陽局起一宮順行夏至後用陰局起九宮逆行推入紀元之法嵗月日時皆同第一求太一宮次宮法三宮周二十四置不滿元法之算以宮周去之餘以宮法而一起一宮順行唯不入中五第二求計神置不滿元法之算以計周十二去之餘起寅逆行十二辰陰局起申第三求合神子丑合寅亥合卯戌合辰酉合己申合午未合視嵗所在如嵗在子合神在丑嵗在丑合神在子第四求天目文昌周法十八置不滿元法之算以周法去之餘起武德順行十六辰次遇陰德大武重留一算陰局起呂申順行遇太昊和德重留一算第五求始擊置十六宮為天地二盤以天盤計神所臨之宮加地盤和德上視天盤文昌臨地盤何宮其宮便為始擊第六求主算視文昌所在宮在正宮以宮數起算一宮為一算九宮為九算在閒神不當八卦者只起一算順行至太一前一宮而止所在閒神為算一其經行閒神不列算數第七求客算視始擊所在宮其法同文昌第八求主大將客大將視算多少取其竒齡以為宮數滿十去之若其數遇十則去九存一遇五者名曰無將五為虛宮主視主算客視客算第九求主參將客參將以大將所臨之宮三因之仍去十用零以為參將之宮第十求定計目大小將以嵗月日時所用之計合神為天盤加地盤嵗月日時之辰視天盤文昌臨地盤何宮其下即為定計目也又視定計目所在依二目法起宮間止太一前以取算又依主客算法去十用零以為定計大將又三因大將宮數以為定計參將三基太一君基邦周三百六十邦率三十邦盈差二百五十置積年加邦盈差以邦周去之餘以邦率而一起午邦順行十二辰不滿為入邦以來年數臣基邦周三十六邦率三邦盈差二百五十置積年加邦盈差以邦周去之餘以邦率而一起午邦順行十二辰不滿為入邦以來年數民基周法十二邦率一邦盈差二百五十置積年加邦盈差以周法去之餘起戌邦順行十二辰五福太一一宮曰黃祕在西河之乾地二宮曰黃始在遼東之艮地三宮曰黃室在東之巽地四宮曰黃庭在蜀川之坤地五宮曰𤣥室在洛邑之北宮宮周二百二十五宮率四十五宮盈差一百一十五置積年加宮盈差以宮周去之餘以宮率而一起一宮乾行至五宮不滿宮率者為入宮以來年數四神太一一宮二宮三宮四宮五宮六宮七宮八宮九宮絳宮明堂玉堂已上十二宮天一地一直符四神皆順行天一宮周三十六宮率三置積年以宮周去之餘以宮率而一起六宮不滿宮率為入宮之年地一起九宮直符起五宮四神起一宮宮周宮率皆同天一太遊太一宮周二百八十八宮率三十六宮盈差三十四置積年加宮盈差以宮周去之餘以宮率而一起七宮順行不入中五大遊天目神周一十八神盈差二百一十四置積年加神盈差以神周去之餘起天道順行十六神遇大武陰德重留一算直事太一周紀三百六十紀法六十宮周九宮盈差三置積年以周紀去之餘以紀法而一所得為一紀不滿紀法者為入紀年數置不滿紀法者加盈差以宮周去之餘起一宮逆行即為直事以直事釣入中宮其相次之神順排六七八九一二三四之宮為釣位一太一坎九天一離八太陰艮七咸池兑六青龍乾五天符中四招搖巽三軒轅震二攝提坤十精太一天皇周法二十置積年以周法去之餘起武德順行十六神遇乾坤艮巽四維重留一算陰局取對衝十精皆倣此帝符周法二十置積年以周法去之餘起陰主順行十六神遇坎離震兑四正重留一算天時周法十二置積年以周法去之餘起呂申順行十二辰天諱周法四置積年以周法去之餘起地主逆行四正飛鳥周法九置積年以周法去之餘起陰德順行九宮五行周法五置積年以周法去之餘起陰德行地主和德大昊大武五宮八風周法九置積年以周法去之餘起大威順行九宮五風周法九置積年以周法去之餘先陽後陰以一三五七九二四六八為次三風周法九置積年以周法去之餘以三七二六一五九四八為次太一數置積年以大周法三百六十去之不足以元法七十二去之餘順行每宮一數太一命法卦限陽九限取日干化氣之五行從所生之方而起男順女逆初限依化氣之生數交宮其次皆十年一交甲巳化土火生土故起於午土數五五年而後交宮乙庚化金土生金故起於已金數四四年而後交宮丙辛化水金生水故起於申水數一一年而即交宮丁壬化木水生木故起於亥木數三三年而後交宮戊癸化火木生火故起於寅火數二二年而後交宮百六限取生日生時干支及納音六者生成之數積之如天地之數五十有五以六十除之餘為限數以限數從生日之辰逆數至於數盡謂之受氣其受氣之干依陽九限化氣起所生之方大限十年一易男順女逆小限一年一易男逆女順入卦以年月日時干支及納音十二者生成之數積之加入天地之數以六十四除之餘為入卦之次卦次依周易視受氣之辰屬陽屬陰陽用陽爻初三五自下而升陰用陰爻二四上自上而降皆起於子數至受氣之支即為動爻其行限陽爻九年陰爻六年爻之陰陽與上異皆自動爻順行本卦既畢動爻變為之卦從變爻起限一如本卦本卦為出身之限卦之卦為立業之卦限流年卦就出身卦次加入行年幾嵗滿六十四除之餘便為流年卦視百六限所到宮辰陽用陽爻自下升陰用陰爻自上降起子數至宮辰為動爻月卦就流年卦次從天正起加入所求之月滿六十四除之便為月卦陽月用陽爻下升陰月用陰爻上降起子數至月建之辰為動爻日卦就月卦次從甲子起加入所求之日滿六十四去之便為日卦陽日用陽爻下升陰日用陰爻上降起子數至日辰為動爻時卦就日卦次加所直之時為時卦陽辰用陽爻下升陰辰用陰爻上降起子數至當時為動爻年月日時皆只取動爻餘爻不用大遊卦法內卦一宮乾二宮離三宮艮四宮震六宮兑七宮坤八宮坎九宮㢲中五不入宮周二百八十八宮率三十六宮盈差三十四置積年加宮盈差滿宮周去之餘以宮率而一起七宮坤順行八宮即為內卦其不滿宮率者是入卦年數外卦六十四卦周六百四十八卦周八十卦率一十置積年加宮盈差滿六十四卦周去之不盡滿八卦周去之餘以卦率而一起七宮坤順行八卦不滿卦率者是入卦年數即為外卦以內外相重得值運之卦動爻大遊入內卦三十六年均分於重爻之六爻則六年行一爻視當下入內卦以來年數自一至六初為動爻自七至十二二為動爻十三至十八三為動爻十九至二十四四為動爻二十五至三十五為動爻二十一至三十六上為動爻小遊卦法內卦卦周一百九十二卦率二十四置積年滿卦周去之餘以卦率而一起一宮乾順行不滿卦率者為入卦以來年數外卦卦周紀元一百六十卦周二十四卦率三置積年滿紀元去之不盡以卦周去之餘以卦率而一起一宮乾順行為外卦以內外相重得值運之卦直爻以內卦之率分於重卦之六爻每爻四年視入內卦以來年數即知所入之爻遁甲遁甲太一六壬三書世謂之三式皆主九宮以參詳人事而甲尤注意於兵其術之自以為精者在超神接氣置閏之間起神者節氣未到而甲子己邜之符頭先到則借用未到節氣之上局故謂之超接氣者甲子己卯之符頭未至而節氣先至則仍用已過節氣之下局故謂之接蓋緣一月節氣必三十日零五時二刻積之而符頭節氣遂相參差至於順將變逆逆將變順在芒種大雪之後有超至九日十日者則為之置閏芒種後則叠芒種上中下三局大雪後則叠大雪上中下三局以歸每節氣所餘五時二刻而後二至之順逆始分於是節先局後不得不以接氣繼之矣是欲與厯法相符某則以為自亂其術者此也節氣三十日所零者五時二刻耳積之一百八十日之久則為時三十為刻二十蓋不及三日也符頭五日一換所差不過半局略為消息便可符合今以超神而太過者九日十日以置閏而不及者五日六日氣序不清局法重出甲之所重者在二至置閏歸餘於其前半年之中必有超神超神之後必且置閏閏閏之局必侵二至是二至必不能正其始也順者反逆逆者反順使其吉凶星煞無驗則可不然則避其所當趨趨其所當避矣某故以為自亂其術也遁甲發凡先觀二至以分順逆冬至後為陽遁順布六儀逆布三竒夏至後為陰遁逆布六儀順布三竒六儀甲子戊甲戌己甲申庚甲午辛甲辰壬甲寅癸三竒乙丙丁順布者自一宮而至九宮逆布者自九宮而至一宮三竒順逆即布於六甲之後次觀節氣以定三元三元者上中下三局也以甲巳二將為符頭此日也符頭所臨之支直子午邜酉為上元直寅申巳亥為中元直辰戌丑未為下元五日六十時一換符頭半月一氣而三局周如冬至一七四甲子為符頭至戊辰五日皆從坎一宮起為上元己巳為符頭至癸酉五日皆從兑七宮起為中元甲戌為符頭至戊寅五日皆從巽四起為下元餘倣此陽遁順局冬至驚蟄一七四小寒二八五大寒春分三九六立春八五二雨水九六三清明立夏四一七穀雨小滿五二八芒種六三九陰遁逆局夏至白露九三六小暑八二五大暑秋分七一四立秋二五八處暑一七四寒露立冬六九三霜降小雪五八二大雪四七一次觀旬首以取符使旬首者用事時辰其首之六甲也旬首所泊之宮星即為直符門即為直使如在坎宮則天蓬為直符休門為直使直符隨時干視所用時干泊在地盤何宮即以天盤直符移在此宮直使隨時宮視所用時辰泊在地盤何宮即以天盤直使移在此宮小直符加大直符以八詐門之直符加於九星直符所臨之宮陽順陰逆超神接氣直指竒門之法有正授有超神有閏竒有接氣正授之後超神繼之超神之後閏竒繼之閏竒之後接氣繼之接氣之後復為正授符頭甲巳正對節氣謂之正授此後則符漸漸過節而為超神矣超至九日及十餘日則當置閏以其離後節氣太逺故必有閏然後可配氣候與厯家閏法同然置閏必在芒種大雪之後二至之前其餘節氣雖遇超至九日之外不可置閏也假如萬厯己丑年正月初二庚戌日辛巳用事係冬至後陽遁順局符頭係己酉管事本月初六日交雨水節上局乃超神也從九宮起順布六儀戊在離已在坎庚在坤辛在震壬在巽癸在中宮逆布三竒乙在艮是為任乙丙在兑是為柱丙丁在乾是為心丁地盤艮兑乾三宮有竒辛巳時旬首係甲戌泊在坎宮以天蓬為直符加在地盤震宮順數任在巽是天任星帶艮之乙竒到巽衝在離輔在坤英在兑芮在乾柱在坎是天柱星帶兑之丙竒到坎心在艮是天心星帶乾之丁竒到艮三竒在地盤者今隨天盤旋轉而在巽坎艮三方矣辛巳時宮泊在艮以直使休門加地盤之艮順數生在震傷在巽杜在離景在坤死在兑驚在乾開在坎艮得丁竒而逢休門謂之休與星合坎得丙竒而逢開門謂之開與月合俱吉獨巽得乙竒而逢傷門未為全吉再以八詐門直符隨九星直符在震宮順數則騰蛇在巽太陰在離六合在坤勾陳在兑朱雀在乾九地在坎九天在艮坎艮二宮既合竒門而又逢九地九天為全吉也又天盤丙加地盤甲戌直符為鳥趺冗尤為合格假如萬厯己丑年十一月初六庚戌日戌寅時用事本日符頭是己酉當用上局查十月二十九癸卯日已交大雪節氣從十月二十日甲午為大雪超神上局二十五日己亥大雪中局三十日甲辰大雪下局三局已完今十一月初五己酉以後似當作冬至上局不知符已超節九日正當置閏故自初五日己酉至初九日癸丑不作冬至上局而為大雪閏竒上局初十日甲寅至十四日戊午為大雪閏竒中局十五日己未至十九日癸亥為大雪閏竒下局直到二十日甲子方作冬至上局然十四日戊午已交冬至節則符在節後五日矣此所謂接氣也今以初六日庚戌戊寅時為例演之係夏至後未交冬至尚用陰遁逆局從四宮巽起六儀戊在巽已在震庚在坤辛在坎壬在離癸在艮乙竒在中宮寄坤丙竒在乾丁竒在兑本時戊寅其旬首係甲戌泊在震宮天衝為直符傷門為直使時干戊泊在巽以天衝直符加巽輔在離英在坤芮在兑是為天芮星𢃄中宮之乙竒到兑柱在乾是為天柱星𢃄兑之丁竒到乾心在坎是為天心星𢃄乾之丙竒到坎蓬在艮任在震時宮戊寅泊在艮宮以直使傷門加艮杜在震景在巽死在離驚在坤開在兑休在乾生在坎乙竒到兑逢開門是謂開與日合丁竒到乾逢休門是謂休與星合丙竒到坎逢生門是謂生與月合俱吉然生門屬土臨坎宮乃門制其宮謂之迫此未盡善也又以八詐門之直符隨九星直符在巽逆行騰蛇在震太陰在艮六合在坎勾陳在乾朱雀在兑九地在坤九天在離則坎宮有竒門又逢六合正北方大吉餘倣此衡運胡仲子列十二運推明皇帝王霸之升降其法在太一書較之揚子雲之卦序差為整齊非唐宋以後人所能作也以初爻為建功立德之限三爻為內極災變之限四爻為亂後待治之限上爻為外極災變之限二五爻為中道安平之限陰陽當位則治失位則亂得應則得臣失應則失臣太一理二爻之時陽雖失位猶可無事惟臨出運之際國有災殃行至五爻陰居失位君弱臣强妃戚專政衰亡將至以其近於外極也初爻之建立功德若當太一所理苟非其人則有革命者起而應之行內極之限災變尚輕行外極之限災變始重月卦者小運也以太一之掩迫察其虛實以小運定其期故舉其大概三代亡而秦始立也入萃上漢之亡入復上唐之亡入謙上宋之亡入垢上皆為外極之限其有然不然者將以不然者廢其然與則曰何可廢也留其不然以觀人事留其然以觀天運此天人之際也前四運皇帝王霸當之仲子言猶春之有夏秋之有冬康節亦以春夏秋冬配皇帝王霸春夏既為秋冬秋冬必復春夏天運自然則前四運之為皇帝王霸後運繼之亦復當然今四運之後兩運過中非惟不能復皇帝即所謂霸者亦不可得將秋冬之後更有别運天人之際一往不返者何耶仲子曰時未臻乎革仲尼不能有為仲尼沒今二千年猶未臻乎革也革在十二運之終十二運告終始復其常前為四運後為八運參差多寡無乃懸絶以仲子之言為是耶孟子所謂一治一亂者正相反以仲子之言為非耶前之二千餘年者既如斯後之四千八百年寧可必乎倘若以漢唐宋之小治衡之三代而上是謂䙝天又某之所不敢也胡仲子翰衡運論皇降而帝帝降而王王降而霸猶春之有夏秋之有冬也由皇等而上始乎有物之始由霸等而下終乎閉物之終消長得失治亂存亡生乎天下之動極乎天下之變紀之以十二運統之以六十四卦乾天道也健而運乎上坤地道也順而承乎下天地既判其氣未交為否既交為泰始乎乾訖乎泰四卦統七百二十年陽爻三十六陰爻二十四每卦所積之數後倣此是為天地否泰之運乾一索得男而為震坤一索得女而為巽震長男也巽長女也夫婦之道也始成為恆既交為益乾再索得男而為坎坎中男也坤再索得女而為離離中女也中男中女夫婦之道成為既濟既交為未濟乾三索得男而為艮艮少男也坤三索得女而為兑兑少女也少男少女夫婦之道成為損既交為咸十二卦統二千一百六十年是為男女交親之運男治政於先女理事以承其後男之治也從父之道大壯也無妄也長男從父者也需也訟也中男從父者也大畜也遁也少男從父者也六卦統一千一百五十有二年是為陽晶守政之運女之治也從母之道觀也升也長女從母者也晉也明夷也中女從母者也萃也臨也少女從母者也六卦統一千有八年是為陰毳權衡之運坤陰也得陽育而生男乾陽也得陰化而生女男歸於母女應於父豫也復也長男歸母者也比也師也中男歸母者也剝也謙也少男歸母者也六卦統九百三十有六年是為資育還本之運小畜也垢也長女應父者也同人也大有也中女應父者也夬也履也少女應父者也六卦統一千二百二十有四年是為造符天之運乾坤父母之道也必有代者焉代父者長男也從長男者中男少男也解也屯也中男從長者也小過也頥也少男從長者也四卦統六百七十有二年內外以剛陽治政是為剛中健至之運陽剛之極陰必行之代母者長女也從長女者中女少女也家人也鼎也中女從長者也中孚也大過也少女從長者也四卦統七百六十有八年內外以陰柔為治是為羣愚位賢之運陰隨於陽為順豐也噬嗑也中女從長男者也歸妹也隨也少女從長男者也節也困也少女從中男者也六卦統一千八十年是為德義順命之運陽隨於陰為不順渙也井也中男從長女者也漸也蠱也少男從長女者也旅也賁也少男從中女者也六卦統一千八十年是為惑妬留天之運長男既息為男之窮也長女既息為女之窮也於是中男與少男相搏焉蹇也蒙也二卦統三百三十有六年是為寡陽相摶之運陽之搏也陰必隨之於是中女與少女㑹焉睽也革也二卦統三百八十有四年是為物極元終之運十二運上下萬有一千五百二十載陽來陰往太乙臨之不浸則不極不極則不復復而與天下更始非聖人不能也聖人非天不生也天生仲尼當五伯之衰而不能為太和之春者何也時未臻乎革也仲尼沒繼周者為秦為漢為晉為隋為唐為宋垂二千年猶未臻乎革也泯泯棼棼天下之生欲望其為王為帝為皇之世固君子之所深患也余聞之廣陵秦曉山乃推明天人之際皇帝王霸之别定次於篇卦運表一天地否泰之運七百二十年六造化符天之運一千四百二十四年乾二百一十六二百四坤一百四十四垢二百四否一百八同十人二百四泰一百八大十有二百四二男女交親之運二千一百六十年夬二百四震一百六十八履二百四巽一百九十二七剛中健至之運六百七十二年恆一百八十解一百六十八益一日八十屯一百六十八坎一百六小十八過一百六十八離一百九十二頥一百六十八既濟一百八十八羣愚位賢之運七百六十八年未濟一百八家十人一百九十二艮一百六十八鼎一百九十二兑一百九中十二孚一百九十二損一百八大十過一百九十二咸一百八十九德義順命之運一千八十年推法周䇿一萬一千五百二十卦盈差三百置積年加卦盈差滿周䇿去之餘起乾坤否泰之運纍之即得所入之卦以入卦年數陽爻三十六陰爻二十四即得所入之爻積年上元甲子至今壬子作象數論之年一千一十五萬五千五百八十九年流年直卦法置積年滿卦周六十四去之餘依周易次序即得所直之卦視所求之年陽辰不取陰爻以卦內陽爻起子自下而上循環數至嵗支以為動爻陰辰不取陽爻以卦內陰爻起子自下而上循環數至嵗支以為動爻起動爻為正月依次布於六爻以動爻為變卦起變爻為七月亦依次布於六爻易學象數論卷六
