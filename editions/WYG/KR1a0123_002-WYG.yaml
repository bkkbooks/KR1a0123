body:
  text: 易學象數論卷二餘姚黄宗羲撰卦氣一易緯有卦氣之法京房精於其學以坎震離兑主二十四氣其餘六十卦起自中孚卦有六爻爻主一日凡主三百六十日餘五日四分日之一毎日分為八十分五日得四百分四分日之一得二十分積四百二十分均於六十卦六七四十二每卦得六日七分又於六十卦之中别置復臨泰大壯夬乾姤遯否觀剥坤十二以為辟卦毎爻各主一侯自復至乾為息卦曰太陽自姤至坤為消卦曰太隂息卦所屬者曰少陽消卦所屬者曰少隂故孔頴達復彖反復其道七日來復之䟽謂剥卦陽氣之盡在於九月之末十月純坤用事坤卦之盡則復卦陽來坤卦有六日七分舉成數故言七日王昭素駁之曰坤卦之盡復卦陽來則十月之節終一陽便來不得到冬至之日矣據其節終尚去冬至十五日則卦七日之義難用易緯之數某以為昭素駁之是矣然昭素未悉卦氣之法不能鍼其痼疾也以十二辟卦言之剥之至復所隔惟坤六爻其一爻當一候一候得五日五分六分分之五六爻得三十日三十五分非七日也以六十卦言之一卦六日七分剥之至復中隔艮既濟噬嗑大過坤未濟蹇頥中孚九卦計五十四日六十三分非一卦也孔氏牽合兩者故其説不能合易之七日來復取卦之反易為義反剥為復所厯七爻以一日為一爻故曰反復其道反復即反覆也與卦氣何與即使孔氏之䟽能合卦氣則易之辭無乃為卦氣圖説乎為卦氣之法者宓戲耶文王耶先儒之議卦氣者謂冬至不起于中孚而起於復中孚為大雪之終氣至冬至而始盡故繫於冬至之下中孚之於冬至於象於名兩無當也然觀太𤣥之辭曰陽氣藏於黄宫信無不在其中則中孚之直冬至者顧以其名耳太𤣥之釋卦序自辟卦之外無不以其名為義也又何獨疑於中孚乎所謂六日七分者六日既盡七分便為來日之始非必取足八十分而自為一日也趙汝楳乃以餘筭歸之一卦於是有一卦直七日者失其意矣葉氏則以七分為之氣盈六十卦餘五日二十分若積餘以置閏者是一卦直六日且并焦京之學失其傳也卦氣二六日七分之説相傳最久其餘卦氣皆自後起有自乾至未濟並依易書本序以一卦直一日乾直甲子坤直乙丑至未濟直癸亥乃盡六十日六周而三百六十日四正卦則直二分二至坎冬至離夏至震春分兑秋分不在六十卦輪直之列者焦氏之法也有以乾坤坎離四卦為橐籥餘六十卦依序卦一爻直一時一月有三百六十時足其數者又以十二辟卦每卦管領一時魏伯陽之法也乾起甲子坤起甲午毎卦直六月者京房之法也史繩祖曰革居序卦之四十九當大衍之數節居序卦之六十當周天之度六十卦三百六十爻一爻主一日上經乾起甲子泰甲戌噬嗑甲申至離三十卦一百八十日而三甲盡下經咸起甲午損甲辰震甲寅至節癸亥而終亦三十卦一百八十日而一年周故曰天地節而四時成亦曰天地革而四時成中孚小過既未濟者分坎離震兑中孚㢲上兑下小過震上艮下既未濟皆坎離以應分至毎爻直十五日以應二十四氣先儒言卦起中孚非也以六十卦言甲子起於乾以分至四卦言甲子亦起於中孚亦古法也至宋而後有所謂先天圖者於是邵子以六日七分之法施於其圖黜卦起中孚之説以復起冬至姤起夏至其以坎離震兑四正卦主二十四氣者改為乾坤坎離此圓圖之卦氣也張理以方圖覆背置之泰處於東北乾處於東南否處於西南坤處於西北亦以冬至起復至泰而正月至乾而四月至否而七月至坤而十月此方圖之卦氣也張氏又以一隂一陽至六隂六陽類而並列六陽處南六隂處北陽自下而升隂自上而降廣辟卦之法也邵子又以方圖乾兑離震各重之為六十四卦共一百五十六卦以之筭大運亦以筭小運二十四氣毎氣六十四爻積一千五百二十六爻合乾兑離震掛一之數謂之掛一圖所謂皇極之學也諸家之不同如此葢初無一定之理各以意之所見為之是故六日七分之外有一卦直一日者有兩卦直一日者一爻直一日者四爻三分强直一日者總卦與日之大數而後分配其小數或多或少不顧其果否如是也其卦之排比惟序卦可據序卦之義於時日不可强通故漢儒别求其義於卦名而有中孚之起然揚雄氏所傳之卦義未免穿鑿附㑹未嘗為易之篤論也宋儒始一變其説以竒偶之升降消長為言而於經文四時可據之方位一切反之然則宋儒之畫漢儒之義猶二五之為十也孰分其優劣哉卦變卦變之説由泰否二卦彖辭小往大來大往小來而見之而夫子彖傳所以𤼵明卦義者於是為多顧易中一大節目也上經三十卦反對之為十二卦下經三十四卦反對之為十六卦乾坤頥大過坎離中孚小過不可反對則反其竒偶以相配卦之體兩相反爻亦隨卦而變顧有於此則吉於彼則凶於彼則當位於此則不當位従反對中明此往來倚仗之理所謂兩端之執也行有无妄之守反有天衢之用時有豐亨之遇反有羈旅之凶是之謂卦變非以此卦生彼卦也又非以此爻換彼爻也朱子言以彖辭考之説卦變者凡十九卦葢言成卦之由彖辭不言成卦之由則不言所變之爻此是朱子自言其卦變也繫曰爻者言乎變者也易中何卦不言變辭有隠顯而理無不寓即證之彖辭亦非止十九卦也訟剛來而得中以需之反對觀之彼得正又居中此但得中不能得正泰否之往來所謂反其類隨剛來而下柔蠱剛上而柔下二卦反對蠱上之剛自外卦來初居二三之下隨初剛自下而上上柔自上而下噬嗑柔得中而上行賁柔來而文剛分剛上而文柔前卦言六二上行為五後卦言六五自外卦而入内初九從下卦而至上无妄剛自外來而為主於内大畜剛上而尚賢无妄之初九自大畜上爻外卦來為内卦之主大畜之上九自无妄初爻而上咸柔上剛下恒剛上柔下咸指上六九三恒指九四初六晉柔進而上行明夷之六二上行為六五睽柔進而上行家人之六二上行為六五蹇往得中也解其來復吉乃得中也蹇之九五自解内卦故曰往解之九二自蹇外卦故曰來升柔以時升升上卦之柔皆萃下卦所升鼎柔進而上行鼎五由革二而上漸進得位漸九五當歸妹居二為不得位渙剛來而不窮者節五來二柔得乎外而上同者柔在三失位在四得位此朱子所謂十九卦之彖辭皆以反對為義者也需位乎天位以正中也自訟九二而來得中又得正損損下益上其道上行益損上益下自上下下由損觀之似以三爻益上爻由益觀之似以四爻益初爻小畜宻雲不雨反對為􅂂􅂂下之兑澤氣成雲故曰宻雲兑變而㢲風以散之故曰不雨大有應乎天而時行方其同人在二之時應乎天也今時行而居其位謙地道卑而上行地道指坤豫在下卦為卑謙在上卦為上行臨至於八月觀二陽在上臨二陽在下自臨至觀厯八爻故言八月復七日來復剥一陽在上復一陽在下自剥至復厯七爻故言七日明夷初登於天言晉後入於地言明夷夬所尚乃窮對姤為言井改邑不改井兑為剛鹵之地變而為㢲則近利市三倍是改邑也坎不變是不改井也皆對困言之歸妹征凶位不當也漸之二五皆當位至歸妹皆不當旅柔得中乎外在豐為得中乎内㢲柔皆順乎剛兑剛中而柔外兑柔不順乎剛㢲柔中而剛外二卦相反既濟剛正而位當未濟不當位二卦亦相反此朱子十九卦以外亦皆以反對為義者也反對之窮而反其竒偶以配之又未嘗不暗相反對於其間如中孚上爻之翰音反對即為小過初爻之飛鳥頥之口實由大過之兑大過士夫老夫由頥之艮震此序卦之不可易也奈何諸儒之為卦變紛然雜出而不能歸一乎然虞仲翔之釋比曰師二上之五得位蜀才曰此本師卦六五降二九二升五亦已𤼵其端矣特未以此通之於别卦也至李挺之所傳變卦反對圖可謂獨得其真而又與六十四卦相生圖並出則擇焉而不精也其後來知徳頗以此説變而以反對者為綜竒偶相反者為錯於頥過八卦相反之外取反對者而亦復錯之不知竒偶相反之中暗寓反對非别出一義也若又有相反一義何以卦爻畧不之及乎為卦爻之所不及者可以無待於補矣卦變二古之言卦變者莫備于虞仲翔後人不過踵事増華耳一隂一陽之卦各六皆自復姤而變二隂二陽之卦各九皆自臨遯而變三隂三陽之卦各十皆自否泰而變四隂四陽之卦各九皆自大壯觀而變中孚小過為變例之卦乾坤為生卦之原皆不在數中其法以兩爻相易主變之卦動者止一爻四隂四陽即二隂二陽之卦也其變不収于臨遯之下者以用臨遯生卦則主變者須二爻皆動而後餘卦可盡不得不别起觀壯有四隂四陽而不用五隂五陽之夬剥者以五隂五陽之卦已盡於姤復無所俟乎此也中孚小過為變例之卦何也中孚從二隂之卦則遯之二隂皆易位従四陽之卦則大壯三四一時俱上小過従二陽之卦則臨之二陽皆易位従四隂之卦則觀三四一時俱上所謂主變之卦以一爻升降者至此而窮故變例也猶反對之卦至乾坤坎離頥大過中孚小過而亦窮也虞氏之卦變脈絡分明如此當時所著周易注周易集林今既不傳其見於李鼎祚易解中者語焉不詳朱漢上據之以定虞氏卦變遂有此然彼否之異無怪趙汝楳謂其錯雜無統也某追㝷其緒而後知漢上之誤然四隂四陽與二隂二陽畢竟相錯不能不有重岀之卦此八卦者重於大壯者為大過鼎革離重於觀者為頥屯䝉坎其主變屬之臨遯乎屬之大壯觀乎抑兼屬之乎其説有時而窮也以彖傳證之如无妄之剛自外來遯之初三相易皆在内卦非外來晉之柔進上行觀之四五相易皆在上卦睽之柔進上行大壯三上相易柔為下行蹇往得中觀三上相易不為得中皆不能合此虞氏之短也李挺之六十四卦相生圖凡卦五隂一陽者皆自復來復一爻五變而成五卦師謙豫比剥五陽一隂者皆自姤來姤一爻五變而成五卦同人􅂂小畜大有夬四隂二陽者皆自臨來臨五復五變而成十四卦明夷震屯頥升解坎䝉小過萃觀蹇晉艮四陽二隂者皆自遯來遯五復五變而成十四卦訟㢲鼎大過无妄家人離革中孚大畜大壯睽需兑三隂三陽者皆自泰來泰三復三變而成九卦歸妹節損豐既濟賁恒井蠱三陽三隂者皆自否來否三復三變而成九卦漸旅咸渙未濟困益噬嗑隨其所謂乾坤一生二二生三至於三極矣故不以觀壯四隂四陽之卦為主變可以無虞氏重岀之失矣然臨遯自第二變以後主變之卦兩爻皆動在彖傳亦莫知適従又不如虞氏動以一爻之有定法也方寔孫有易卦變合圖與相生圖同至兩爻交動則稍更其次序朱風林分為内外體有自十辟卦所變者乾坤無變故十二辟卦去之為十卦一陽在内體自復變凡二卦師謙一陽在外體自剥變凡二卦豫比二陽在内體自臨變凡二卦升明夷二陽在外體自觀變凡二卦晉萃二陽在内體一陽在外體自泰變凡九卦與相生圖同一隂在内體自姤變凡二卦同人履一隂在外體自夬變凡二卦小畜大有二隂在内體自遯變凡二卦无妄訟二隂在外體自大壯變凡二卦需大畜二隂在内體一隂在外體自否變凡九卦與相生圖同有自六子卦所變者二陽分在内外不處震之主爻者自震變蹇䝉不處坎之主爻者自坎變小過頥不處艮之主爻者自艮變解屯二隂分在内外不處㢲之主爻者自㢲變癸革不處離之主爻者自離變中孚大過不處兑之主爻者自兑變家人鼎各得二卦其自十辟卦所變者以一爻升降其自六子卦所變者以兩爻升降自三隂三陽而外主變之卦多所生之卦少何其頭緒之紛紜也蘓子瞻言剛柔相易皆本諸乾坤程子亦専以乾坤言卦變本之蜀才曰此本乾卦此本坤卦荀爽曰謙是乾來之坤非創論也但三隂三陽之卦此往彼來顯然可見其他則來者不知何來往者不知何往如无妄剛自外來外卦之乾未嘗損一剛也而云自外而來不已背乎故朱子曰程子専以乾坤言卦變然只是上下兩體皆變者可通若只一體變者則不通葢已深中其病矣然較之虞氏而下鑿空為説者某以為獨優也卦變三朱子卦變圖一隂一陽之卦各六來自復姤二隂二陽之卦各十有五來自臨遯三隂三陽之卦各二十來自否泰四隂四陽之卦各十有五來自大壯觀五隂五陽之卦各六來自夬剥一隂一陽與五隂五陽相重出二隂二陽與四隂四陽相重出泰與否相重出除乾坤之外其為卦百二十有四葢已不勝其煩矣易之上下往來皆以一爻升降為言既有重出則毎卦必有二來従其一則必舍其一以彖傳附㑹之有一合必有一不合就其所謂一來者尚有兩爻俱動并其二來則動者四爻矣原諸儒卦變之意所以明其自復姤臨遯否泰大壯觀夬剥而來者以其卦惟此一爻之故變為别卦是以脈絡可㝷而定為主變使一卦之中頭緒紛然爻爻各操其柄則彼卦之體已不復存猶復可認其自某所而來乎朱子雖為此圖亦自知其決不可用所釋十九卦彖辭盡舍主變之卦以兩爻相比者互換為變訟則自遯二三相換泰則自歸妹三四相換否則自漸三四相換隨則自困初二相換自噬嗑五上相換自未濟初與二五與上相換蠱則自賁初二相換自井五上相換自既濟初與二五與上換噬嗑則自益四五相換賁則自損二三相換自既濟五上相換无妄則自訟初二相換大畜則自需五上相換咸則自旅五上相換恒則自豐初二相換晉則自觀四五相換睽則自離二三相換自中孚四五相換自家人二與三四與五相换蹇則自小過四五相換解則自升升則自解皆三四相換鼎則自㢲四五相換漸則自渙二三相換自旅四五相換渙則自漸二三相換凡十九卦而主變者二十有七或來自一卦或來自兩卦三卦多寡不倫絶無義例就以其法推之此十九卦中朱子之所舉者亦有未盡訟之自无妄初二相換自㢲三四相換隨之自既濟三四相換蠱之自未濟三四相換噬嗑之自未濟初二相換自賁三四相换自隨五上相換賁之自蠱初二相換自噬嗑三四相換无妄之自家人三四相換大畜之自睽三四相換咸之自困二三相換恒之自井四五相換晉之自艮三四相換自萃五上相換睽之自大畜三四相換自兑五上相換蹇之自坎二三相換自萃三四相換自艮五上相換觧之自震初二相換自小過二三相換自坎四五相換升之自明夷初二相換鼎之自離初二相換自大過五上相換漸之自否三四相換渙之自益初二相換自未濟四五相換復得二十九卦而兼之者不與焉此二十九卦者以為有用乎則為彖辭之所不及以為無用乎不應同一卦變在一卦中其可以附㑹彖辭者従而取之其不可以附㑹彖辭者従而置之朱子云某之説却覺得有自然氣象者安在也且易所謂往來上下者自内之外謂往自外之内謂來上者上卦也下者下卦也今兩爻互換同在内卦而謂之往同在外卦而謂之來同在上卦而曰下同在下卦而曰上即欲附㑹之而有所不能矣是朱子之卦變兩者俱為無當冝乎其説之不能歸一也古卦變圖一隂一陽之卦各六皆自復姤而變復姤師初之二同人初之二謙初之三履初之三豫初之四小畜初之四比初之五大有初之五剥初之六夬初之六二隂二陽之卦各九皆自臨遯而變臨遯升初之三无妄初之三解初之四家人初之四坎初之五離初之五蒙初之上革初之上明夷二之三訟二之三震二之四㢲二之四屯二之五鼎二之五頤二之上大過二之上三隂三陽之卦各十皆自泰否而變泰否恒初之四益初之四井初之五噬嗑初之五蠱初之上隨初之上豐二之四渙二之四既濟二之五未濟二之五賁二之上困二之上歸妹三之四漸三之四節三之五旅三之五損三之上咸三之上四隂四陽之卦各九皆自大壯觀而變大壯觀重大過初之五重頤初之五重鼎初之上重屯初之上重革二之五重蒙二之五重離二之上重坎二之上兌三之五艮三之五睽三之上蹇三之上需四之五晉四之五大畜四之上萃四之上變例之卦二中孚小過凡變卦皆從乾坤來乾坤李挺之變卦反對圖乾坤二卦為易之門萬物之祖圖第一乾老陽坤老隂乾坤相索三變六卦不反對圖第二坤體而乾來交頤小過坎乾體而坤來交大過中孚離乾卦一隂下生反對變六卦圖第三姤同人履夬有大畜小坤卦一陽下生反對變六卦圖第四復師謙剥比豫乾卦下生二隂各六變反對變十二卦圖第五遯訟无妄壯大需畜大睽兌革人家㢲鼎坤卦下生二陽各六變反對變十二卦圖第六臨明夷升觀普萃蹇艮蒙解震屯乾坤下生三隂各六變反對變十二卦圖第七否恒豐泰咸旅歸妹節既濟漸渙濟未坤卦下生三陽各六變反對變十二卦圖第八泰損賁否益嗑噬蠱井未濟隨困濟既李挺之六十四卦相生圖姤乾一交而為姤復坤一交而為復凡卦五隂一陽者皆自復卦而來復一爻五變而成五卦師謙豫比剥凡卦五陽一隂者皆自姤卦而來姤一爻五變而成五卦同人履小畜大有夬遯乾再交而為遯臨坤再交而為臨凡卦四隂二陽者皆自臨卦而來臨五復五變而成十四卦第一四變明夷震屯頤第二復四變升解坎􅂪第三復三變小過萃觀第四復二變蹇晉第五一變艮凡卦四陽二隂者皆自遯卦而來遯五復五變而成十四卦第一四變訟㢲鼎大過第二復四變无妄家人離革第三復三變中孚大畜大壯第四復二變睽需第五復一變兌否乾三交而為否泰坤三交而為泰凡卦三隂三陽者皆自泰卦而來泰三復三變而成九卦第一三變歸