卦相比一循乾一坤八之序其上體十六卦兩周乾一坤八之序正體則二為内卦之中五為外卦之中互體則三為内卦之中四為外卦之中故皆謂之中爻林黄中栗包體圖包乾乾乾乾包乾乾包坤損益坤包咸恒包震大畜中孚震包革大壯包㢲履同人㢲包姤姤包坎睽家人坎包大過大過包離小畜履離包同人大有包艮中孚无妄艮包遯鼎包兌大有小畜兊包夬夬包坤坤坤坤包坤坤包震謙師震包復復包㢲萃小過㢲包蒙觀包坎豫謙坎包師比包離蹇解離包頤頤包艮比豫艮包剥剥包兌小過升兌包臨屯包乾咸恒乾包損益包震明夷臨震包明夷臨包㢲隨豐㢲包蠱渙包坎震明夷坎包升坎包離既濟歸妹離包賁損包艮比震艮包艮䝉包兌豐泰兌包泰節包乾革大壯乾包小畜中孚包坤復復坤包謙師包㢲訟遯㢲包訟遯包坎未濟漸坎包困咸包離㢲訟離包无妄離包艮渙否艮包否旅包兌鼎㢲兌包兌革包乾姤姤乾包履同人包坤蒙觀坤包萃小過包震蠱渙震包隨豐包坎解蹇坎包解蹇包離井困離包噬嗑賁包艮坎萃艮包晉艮包兌恒升兌包歸妹既濟包乾大過大過乾包睽家人包坤師比坤包豫謙包震升坎震包震明夷包㢲困咸㢲包未濟漸包離家人睽離包家人睽包艮益噬嗑艮包漸未濟包兌離大畜兌包需兌包乾同人大有乾包小畜履包坤頤頤坤包蹇解包震賁損震包既濟歸妹包㢲无妄離㢲包㢲訟包坎噬嗑賁坎包井困包艮觀晉艮包觀晉包兌旅蠱兌包節隨包乾遯鼎乾包中孚无妄包坤剥剥坤包比豫包震艮蒙震包屯震包㢲否旅巽包渙否包坎晉艮坎包坎萃包離漸未濟離包益噬嗑包兌大壯需兌包大壯需包乾夬夬乾包大有小畜包坤臨屯坤包小過升包震泰節震包豐泰包㢲兌革㢲包鼎㢲包坎歸妹既濟坎包恒井包離需兌離包離大畜包艮節隨艮包旅蠱案朱子與林黄中辨云繫辭所謂易有太極是生兩儀兩儀生四象四象生八卦此是聖人作易綱領次第惟邵康節見得分明今侍郎乃以六畫之卦為太極中含二體為兩儀又取二互體通為四象又顛倒看二體及互體通為八卦若論太極則一畫亦未有何處便有六畫底卦來如此恐倒說了兼若如此即是太極包兩儀兩儀包四象四象包八卦與聖人所謂生者意思不同矣林曰惟其包之是以能生之包之與生實一義爾曰包如人之懷子子在母中生如人之生子子在母外恐不同也則林黄中之所謂包體者如需卦乾下坎上是兩儀互體得離兌是四象顛倒為坎下乾上互體得㢲離是八卦今楊止菴傳易考所載包體圖如上與朱子所辨者不同取八卦之互相包裹以為六畫之卦多寡絶殊於大義無所𤼵明豈當時朱子見之以為不足辨而置之歟蓍法揲蓍之法其用四十有九者䇿數四十九無所謂虚一反於櫃中也分而為二以象兩者信手中分由靜而之動動靜兩端也掛一以象三者或左或右隨取一䇿孔氏取左朱子取右横於案上不必在左手小指之間方名為掛一變中凡三掛故曰象三非䝉上象兩而為三也揲之以四以象四時者先取左手之䇿四四為數一䇿一時也歸竒於扐以象閏者四數之餘不一則二不三則四謂之殘竒扐是指間扐物之處歸此殘竒於扐閏者月之餘日竒者揲之餘䇿故象之也五嵗再閏故再扐而後掛者次取右手之䇿四四為數并於前之正䇿其餘䇿左三則右一左二則右二左一則右三左四則右四亦歸之於扐是為再扐猶再閏也其言五嵗者四十八䇿中分為兩除殘竒以外毎手正䇿大約以二十為率四䇿一嵗則二十䇿為五嵗也以明扐之相去如此非必真如五嵗之中有兩閏以齊氣朔也此為第一變别置餘䇿取見存正䇿或四十或四十四信手中分復掛一為二揲四歸竒如前法此為再變并其餘䇿取見存正䇿或四十或三十六或三十二信手中分復掛一為三揲四歸竒如前法此為三變并其餘䇿取正䇿以四而一得九為老陽得六為老隂得七為少陽得八為少隂老變而少不變始成一爻故十八變而成六爻也初變為竒者三為偶者一再變三變為竒者二為偶者二其法見於虞翻氏之注孔穎達氏因之朱子則有蓍卦攷誤以主張是説然法雖是而所以釋經文者則多不合虞氏謂竒所掛一䇿扐所揲之餘當是時揲餘未有安置竒已在掛信如虞説則當言歸扐於竒不應倒置若是且掛餘截然兩事合之有何義理故掛與掛合餘與餘合不相雜也孔氏以三多三少兩少一多兩多一少餘䇿定隂陽之老少經文乾之䇿二百一十有六坤之䇿百四十有四其所以定隂陽老少者指正䇿而言以明餘䇿置之不用矣今棄正䇿而就餘䇿是背經文也蓍之所以必用四十九者以去其十三則得三十六去其十七則得三十二去其二十一則得二十八去其二十五則得二十四只有此九六七八老少四者之䇿若三多三少之數則加乎四十九減乎四十九無不可得亦可不顧九六七八䇿數而以之定老少耶惟餘䇿不用故初變為四為八再變三變為三為七各不相妨今必準餘䇿而以掛一雜於其間連掛則初變之五九為有餘除掛則再變三變之三七為不足無乃違揲四之義乎又有於餘䇿多少分八卦之象者夫三變方成一爻一爻之中但有老少之可分今於一爻而指其孰為乾震坎艮孰為坤㢲離兑是六變而可以成卦矣古人何不憚煩而為此十八變乎朱子𤼵圍徑之義以餘䇿為徑正䇿為圍竒之象圓而徑一得圍三頗為近似偶之象方而徑二得圍二其説有所不達矣此皆執餘䇿之病也蓍法二郭兼山書伊川揲蓍法云四十九蓍兩手無意而中分之於左手取蓍一莖揲於左手小指之間此名竒也以右手之􅆱置之案上取左手之􅆱四揲之四揲之餘數置案之左方次取右手之􅆱四揲之四揲之餘數并入左餘為之扐即取所掛之竒歸於扐一變後復合見存之䇿再以左右手分為二更不重掛竒四揲之餘并入前扐為第二變其第三變如第二變凡揲􅆱第一變必掛一者謂不掛一則無變所餘皆得五也惟掛一則所餘非五則九故能變第二第三雖不掛亦有四八之變葢不必掛也朱子作􅆱卦考誤辨之三變皆掛可為老陽者十二可為老隂者四可為少隂者二十八可為少陽者二十若後兩變不掛則老陽少隂皆二十七少陽九老隂一而已深有害於成卦變爻之法是後兩變之不可不掛審矣某推求其故後兩變不掛與以掛為竒葢相因為説者也􅆱之所以必四十九者毎四而當一月四十有八十二月之數也其一者四分月之一也四分月之一積四嵗成月而為閏然閏恒三嵗以餘分前後相移不截然一嵗餘月之一故五嵗再閏也毎合􅆱為一嵗後兩變未嘗不餘一然而不掛者猶嵗嵗有餘分不俟滿分不可以為閏也十有八變凡六掛而䇿道窮十有八嵗凡六閏而氣朔齊其在一嵗論之乾坤之䇿三百六十堯典曰朞三百有六旬有六日十二月月三十日正三百六十日矣又除小月六日是為嵗有餘十二日乾坤十二爻凡十有二掛此閏數在當期之外者也以厯法㕘合􅆱法姑存之以備一説􅆱法三自隂陽老少之不均也後兩變不掛老隂之變一三變皆掛老隂之變亦止四而已故為説者紛紜宋莊綽作揲􅆱新譜引張轅之法用􅆱四十九莖總筯把之以意中分扐一小指間四揲之第一揲餘一二足滿五餘三四足滿九第二第三揲餘一二足滿四餘三四足滿八皆揲左不揲右四五為少八九為多三多老陽交分三少老陽重分兩少一多少隂拆分兩多一少少陽單分元張理因之以謂揲法従程子張子初變既掛一以象人置而不用後二變乃䝉上不復掛者為是也揲左不揲右従唐張轅莊綽二家綽宋人理誤為唐葢天動地靜陽變隂合地承天而行於義為當左餘一而右承之以三左餘三而右承之以一者成其為竒之陽也左餘二而右承之以六左餘四而右承之以四者成其為偶之隂也明季本竊疑大傳所言大衍之數五十其用四十有九九字當為八字之誤止用四十八䇿虚二以為隂陽之毋分二掛一揲四歸竒三變皆同除掛一外左一則右必二左二則右必一左三則右必四左四則右必三由諸家之法於隂陽老少得其均矣然莊綽之餘三足九張理之餘二承六皆不可通四揲之外方為殘竒五䇿六䇿尚有一揲豈可遷就以合左乎季本則明改經文無所依據然則隂陽老少終不可均乎曰無所俟乎均也成卦之法在隂陽不在老少以古法論之隂陽各三十二九六常少七八常多七八所成之卦與九六所成之卦無以異也爻之變不變在老少六爻之中占者一爻則一變而足七八居其五九六居其一乃可謂之均也若變者與不變者相均將擾擾何所適從乎彼輕改古法以均老少者其亦未達乎此也占法啟蒙占法一爻變則以本卦變爻辭占二爻變則以本卦二變爻辭占以上爻為主三爻變則占本卦及之卦之彖辭而以本卦為貞之卦為悔前十卦主貞後十卦主悔凡三爻變者每卦有二十卦四爻變則以之卦二不變爻占以下爻為主五爻變則以之卦不變爻占六爻變乾坤占二用餘卦占之卦彖辭六爻皆不變則占本卦彖辭而以内卦為貞外卦為悔王氏占法一爻變本卦爻為貞之卦爻為悔二爻兼用二爻變以初變爻為貞次變爻為悔作兩節消息之三爻變以先變為貞後二變為悔四爻變五爻變六爻變皆以先變爻為貞後變爻為悔作四五六節消息之六爻皆不變則占彖辭彖辭為七八不變者設也豐南禺占法貞悔者以六畫言則内為貞外為悔以三畫言則下為貞上為悔貞取定守為義悔取感通為義故六畫則決之外卦三畫則決之於上爻如初二兩爻變則以二決之内卦三爻皆變則以三決之如内三爻皆靜外卦之二爻變三爻變者皆依内卦之例如初之於四或五或上二之於四或五或上三之於四或五或上皆二爻變槩決之於悔三爻變者如初四五如二五上如三四上四爻變者如初三四上皆以最上一爻決之三爻變者如二三四四爻變者如初二三四則以四決之而參之以二所謂二與四同功而異位也如二三五如三四五如初三五皆三爻變者如初二三五如初二四五如二三四五皆四爻變者如初二三四五為五爻變者則皆以五決之而參之以三所謂三與五同功而異位也如初二三四上如初三四五上如初二四五上皆五爻變者則皆以上爻決之而參之以初葢上下相應亦若二四三五之例也六爻皆變乾坤占二用餘占之卦之貞悔六爻皆靜則占本卦之貞悔六爻變占之卦大象六爻不變占本卦大象若彖辭則専以待卜天子諸侯有大事則􅀢人先筮得其卦書於板以授太卜太卜以墨畫所得之卦於龜腹春灼後左夏灼前左秋灼前右冬灼後右其文入於卦墨謂之食則決於彖葢兩家之所以不從啟蒙者以周公爻辭本為九六之變者設非為七八之不變者設周易不用七八豈有七八而冒用九六之辭哉則以之卦不變爻占者失其意矣彖與爻各自為書彖不取足於爻爻不取足於彖易果為卜筮而作未有爻時彖不可占豈文王為未成之書耶則以占辭平分於爻彖者非矣然王氏之法所謂四五六節消息者則亦雜而無紀豐氏之法所謂二四同功三五同功初上本末者亦强以辭入於占不可為例後之君子苟得左氏之意其無例者未嘗不可見也故一爻變者既占本卦變爻亦占之卦對爻葢未有有貞而無悔者觀左氏晉獻公筮嫁伯姬遇歸妹之睽上爻變既引歸上之刲羊承筐又引睽上之張弧可知矣二爻變者以下爻為貞上爻為悔三爻變者以變末一爻為主本卦為貞之卦為悔觀晉筮立成公遇乾之否三為變末曰配而不終君三出焉終者乾三之終日也否三包羞故配而不終也而啟蒙以晉重耳之貞屯悔豫司空季子占利建侯為例謂當占兩卦彖辭不知凡所遇之卦不論一爻變至六爻變彖辭無不可引用何獨以三爻變專之觀左氏孔成子筮立君遇屯之比此一爻變者而史占屯彖之元亨穆姜遇艮之隨此五爻變者而稱隨彖之辭亦明矣如郭璞遇驢鼠遇遯之蠱又為晉王筮遇豫之睽皆三爻變也皆不稱彖辭四爻變五爻變者皆以變末一爻為主本卦為貞之卦為悔即如穆姜五爻之變主在上爻艮上之敦艮既有止義而隨上之辭拘係之乃從維之故穆姜曰必死於此弗得出矣六爻變者皆以上爻為主兩卦為貞悔六爻不變者以初為貞上為悔觀晉伐楚筮之遇復六爻不變史曰南國䠞射其元王中厥目國䠞王傷不敗何待葢晉貞楚悔初之元吉晉實當之上之行師大敗以其國君凶楚實當之其例明顯如是則無三家之病矣易學象數論卷二
